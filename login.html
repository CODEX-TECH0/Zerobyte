<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .login-container { width: 100%; max-width: 440px; }
        
        .login-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-glass);
        }
        
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-soft);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon i { font-size: 2rem; color: var(--primary); }
        .logo h1 { font-size: 1.75rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; color: var(--text-secondary); }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.2s;
            font-family: inherit;
        }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }
        
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.75rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-glass); }
        .divider span { padding: 0 1rem; }
        
        .admin-link { text-align: center; margin-top: 1rem; }
        .admin-link a { color: var(--primary); text-decoration: none; font-size: 0.875rem; }
        .signup-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); }
        .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .error-box { background: rgba(239, 68, 68, 0.15); border-left: 4px solid #EF4444; padding: 0.75rem; border-radius: 12px; margin-bottom: 1.5rem; display: none; }
        .error-box.show { display: block; }
        .error-box p { font-size: 0.875rem; color: #EF4444; display: flex; align-items: center; gap: 0.5rem; }
        
        @media (max-width: 480px) { .login-card { padding: 1.5rem; } }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue to ZERØBYTE</p>
        </div>
        
        <div id="errorBox" class="error-box">
            <p><i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span></p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="divider"><span>OR</span></div>
        
        <div class="admin-link">
            <a href="../admin/login.html"><i class="fas fa-shield-alt"></i> Admin Login</a>
        </div>
        
        <div class="signup-link">
            Don't have an account? <a href="signup.html">Create account</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const togglePassword = document.getElementById('togglePassword');
    const errorBox = document.getElementById('errorBox');
    const errorMessageSpan = document.getElementById('errorMessage');
    
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    initTheme();
    
    function showError(message) {
        errorMessageSpan.textContent = message;
        errorBox.classList.add('show');
        setTimeout(() => errorBox.classList.remove('show'), 5000);
    }
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    let passwordVisible = false;
    togglePassword.addEventListener('click', () => {
        passwordVisible = !passwordVisible;
        passwordInput.type = passwordVisible ? 'text' : 'password';
        togglePassword.className = passwordVisible ? 'fas fa-eye-slash password-toggle' : 'fas fa-eye password-toggle';
    });
    
    async function handleLogin(email, password) {
        loginBtn.disabled = true;
        const originalHtml = loginBtn.innerHTML;
        loginBtn.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';
        
        try {
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email.trim(),
                password: password
            });
            
            if (error) {
                showError(error.message === 'Invalid login credentials' ? 'Invalid email or password' : error.message);
                return false;
            }
            
            if (data.user) {
                // Update last active
                await _supabase.from('users').update({ last_active_at: new Date().toISOString() }).eq('id', data.user.id);
                
                // ALWAYS redirect to user home.html - Admin has separate login
                showToast('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
            }
            return true;
        } catch (error) {
            showError('Network error. Please check your connection.');
            return false;
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalHtml;
        }
    }
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin(emailInput.value, passwordInput.value);
    });
    
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
    
    async function checkExistingSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            // Always redirect to user home
            window.location.href = 'home.html';
        }
    }
    checkExistingSession();
})();
</script>
</body>
</html>
