<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Notifications - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo { font-size: 1.25rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8B5CF6); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .back-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.25rem; cursor: pointer; }
        .back-btn:hover { color: var(--primary); }
        
        .container { max-width: 680px; margin: 0 auto; padding: 4rem 1rem 1rem; }
        
        /* Header */
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .notifications-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .mark-all-btn {
            background: none;
            border: 1px solid var(--border-glass);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-xl);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        
        .mark-all-btn:hover {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: var(--primary);
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
        }
        
        .filter-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .filter-tab.active {
            background: var(--primary);
            color: white;
        }
        
        /* Notification Item */
        .notification-item {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .notification-item:hover {
            border-color: var(--primary-soft);
            transform: translateX(4px);
        }
        
        .notification-item.unread {
            background: var(--primary-soft);
            border-left: 3px solid var(--primary);
        }
        
        .notification-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-glass);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .notification-icon.like { color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .notification-icon.comment { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .notification-icon.follow { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .notification-icon.message { color: var(--warning); background: rgba(245, 158, 11, 0.1); }
        .notification-icon.system { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-text {
            font-size: 0.9375rem;
            line-height: 1.4;
            margin-bottom: 0.25rem;
        }
        
        .notification-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .notification-actor {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        
        .actor-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .actor-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .actor-name {
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .unread-dot {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        /* Loading Skeleton */
        .skeleton-item {
            background: var(--bg-glass-solid);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            gap: 1rem;
        }
        
        .skeleton-icon {
            width: 48px;
            height: 48px;
            background: var(--border-glass);
            border-radius: 50%;
        }
        
        .skeleton-content {
            flex: 1;
        }
        
        .skeleton-line {
            height: 12px;
            background: var(--border-glass);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.7rem; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .badge-blue { color: #3B82F6; }
        .badge-gold { color: #F59E0B; }
        .badge-admin { color: #8B5CF6; }
        
        @media (min-width: 768px) { .bottom-nav { display: none; } }
        @media (max-width: 767px) { .navbar .back-btn { display: none; } }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="logo" id="logo"><i class="fas fa-bolt"></i> ZERØBYTE</div>
    <div style="width: 24px;"></div>
</nav>

<div class="container">
    <div class="notifications-header">
        <div class="notifications-title">
            <i class="fas fa-bell"></i> Notifications
        </div>
        <button class="mark-all-btn" id="markAllBtn">
            <i class="fas fa-check-double"></i> Mark all as read
        </button>
    </div>
    
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="like"><i class="fas fa-heart"></i> Likes</button>
        <button class="filter-tab" data-filter="comment"><i class="fas fa-comment"></i> Comments</button>
        <button class="filter-tab" data-filter="follow"><i class="fas fa-user-plus"></i> Follows</button>
    </div>
    
    <div id="notificationsList">
        <div class="skeleton-item">
            <div class="skeleton-icon"></div>
            <div class="skeleton-content">
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>
        <div class="skeleton-item">
            <div class="skeleton-icon"></div>
            <div class="skeleton-content">
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>
        <div class="skeleton-item">
            <div class="skeleton-icon"></div>
            <div class="skeleton-content">
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item active" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentFilter = 'all';
    let notifications = [];
    let actorsMap = {};
    
    const notificationsList = document.getElementById('notificationsList');
    const markAllBtn = document.getElementById('markAllBtn');
    const filterTabs = document.querySelectorAll('.filter-tab');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getIconAndClass(type) {
        switch(type) {
            case 'like':
                return { icon: 'fas fa-heart', class: 'like' };
            case 'comment':
                return { icon: 'fas fa-comment', class: 'comment' };
            case 'follow':
                return { icon: 'fas fa-user-plus', class: 'follow' };
            case 'message':
                return { icon: 'fas fa-envelope', class: 'message' };
            default:
                return { icon: 'fas fa-bell', class: 'system' };
        }
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return false; }
        currentUserId = session.user.id;
        return true;
    }
    
    async function fetchActorInfo(actorId) {
        if (actorsMap[actorId]) return actorsMap[actorId];
        
        const { data } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .eq('id', actorId)
            .single();
        
        if (data) {
            actorsMap[actorId] = data;
        }
        return data;
    }
    
    async function loadNotifications() {
        notificationsList.innerHTML = `
            <div class="skeleton-item"><div class="skeleton-icon"></div><div class="skeleton-content"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-item"><div class="skeleton-icon"></div><div class="skeleton-content"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
        `;
        
        let query = _supabase
            .from('notifications')
            .select('*')
            .eq('user_id', currentUserId)
            .order('created_at', { ascending: false })
            .limit(50);
        
        if (currentFilter !== 'all') {
            query = query.eq('type', currentFilter);
        }
        
        const { data, error } = await query;
        
        if (error) {
            notificationsList.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>Error loading notifications</p></div>';
            return;
        }
        
        if (!data || data.length === 0) {
            notificationsList.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p><p style="font-size: 0.875rem; margin-top: 0.5rem;">When someone likes or comments on your posts, you\'ll see them here.</p></div>';
            return;
        }
        
        notifications = data;
        
        // Fetch actor info for all notifications
        const actorIds = [...new Set(data.filter(n => n.actor_id).map(n => n.actor_id))];
        for (const id of actorIds) {
            await fetchActorInfo(id);
        }
        
        renderNotifications();
    }
    
    function renderNotifications() {
        notificationsList.innerHTML = notifications.map(notif => {
            const actor = notif.actor_id ? actorsMap[notif.actor_id] : null;
            const { icon, class: iconClass } = getIconAndClass(notif.type);
            const isUnread = !notif.is_read;
            
            let content = notif.content || '';
            let actorHtml = '';
            
            if (actor) {
                const displayName = actor.display_name || actor.username;
                const avatarInitial = displayName.charAt(0).toUpperCase();
                const badgeIcon = actor.verification_badge === 'admin' ? '<i class="fas fa-shield-alt badge-admin"></i>' : 
                                  actor.verification_badge === 'gold' ? '<i class="fas fa-crown badge-gold"></i>' :
                                  actor.verification_badge === 'blue' ? '<i class="fas fa-check-circle badge-blue"></i>' : '';
                
                actorHtml = `
                    <div class="notification-actor">
                        <div class="actor-avatar">
                            ${actor.avatar_url ? `<img src="${actor.avatar_url}">` : avatarInitial}
                        </div>
                        <span class="actor-name">${escapeHtml(displayName)} ${badgeIcon}</span>
                    </div>
                `;
            }
            
            return `
                <div class="notification-item ${isUnread ? 'unread' : ''}" data-id="${notif.id}" data-target-id="${notif.target_id || ''}" data-target-type="${notif.target_type || ''}">
                    <div class="notification-icon ${iconClass}">
                        <i class="${icon}"></i>
                    </div>
                    <div class="notification-content">
                        ${actorHtml}
                        <div class="notification-text">${escapeHtml(content)}</div>
                        <div class="notification-time">${formatTimeAgo(notif.created_at)}</div>
                    </div>
                    ${isUnread ? '<div class="unread-dot"></div>' : ''}
                </div>
            `;
        }).join('');
        
        // Add click handlers
        document.querySelectorAll('.notification-item').forEach(item => {
            item.addEventListener('click', async () => {
                const notifId = item.dataset.id;
                const targetId = item.dataset.targetId;
                const targetType = item.dataset.targetType;
                
                // Mark as read
                if (item.classList.contains('unread')) {
                    await _supabase
                        .from('notifications')
                        .update({ is_read: true, read_at: new Date().toISOString() })
                        .eq('id', notifId);
                }
                
                // Navigate based on target type
                if (targetId && targetType) {
                    if (targetType === 'post') {
                        window.location.href = `home.html?post=${targetId}`;
                    } else if (targetType === 'comment') {
                        window.location.href = `home.html?comment=${targetId}`;
                    } else if (targetType === 'user') {
                        window.location.href = `profile.html?id=${targetId}`;
                    }
                }
            });
        });
    }
    
    async function markAllAsRead() {
        const unreadIds = notifications.filter(n => !n.is_read).map(n => n.id);
        
        if (unreadIds.length === 0) {
            showToast('No unread notifications', 'info');
            return;
        }
        
        const { error } = await _supabase
            .from('notifications')
            .update({ is_read: true, read_at: new Date().toISOString() })
            .in('id', unreadIds);
        
        if (error) {
            showToast('Failed to mark all as read', 'error');
        } else {
            showToast('All notifications marked as read', 'success');
            await loadNotifications();
        }
    }
    
    // Filter tabs
    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            filterTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            loadNotifications();
        });
    });
    
    markAllBtn.addEventListener('click', markAllAsRead);
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('backBtn')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    // Real-time subscription
    function subscribeToNotifications() {
        _supabase
            .channel('notifications_changes')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'notifications',
                filter: `user_id=eq.${currentUserId}`
            }, () => {
                loadNotifications();
            })
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'notifications',
                filter: `user_id=eq.${currentUserId}`
            }, () => {
                loadNotifications();
            })
            .subscribe();
    }
    
    async function init() {
        if (!await checkAuth()) return;
        await loadNotifications();
        subscribeToNotifications();
    }
    
    init();
})();
</script>
</body>
</html>
