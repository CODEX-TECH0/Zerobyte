<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Group Chat - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            flex-shrink: 0;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .back-btn:hover {
            color: var(--primary);
        }
        
        .group-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }
        
        .group-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            color: white;
            overflow: hidden;
        }
        
        .group-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .group-name-section {
            flex: 1;
        }
        
        .group-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .group-members-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .chat-actions {
            display: flex;
            gap: 1rem;
        }
        
        .chat-actions i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .chat-actions i:hover {
            color: var(--primary);
        }
        
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .members-sidebar {
            width: 280px;
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            position: fixed;
            right: 0;
            top: 60px;
            bottom: 0;
            z-index: 90;
        }
        
        .members-sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sidebar-header h4 {
            font-weight: 600;
        }
        
        .close-sidebar {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .member-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .member-item:hover {
            background: var(--bg-glass);
        }
        
        .member-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .member-info {
            flex: 1;
        }
        
        .member-name {
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex-wrap: wrap;
        }
        
        .member-role {
            font-size: 0.7rem;
            color: var(--primary);
        }
        
        .message {
            display: flex;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            align-self: flex-end;
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-2xl);
            word-break: break-word;
        }
        
        .message.sent .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        
        .message.received .message-bubble {
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-bottom-left-radius: 0.25rem;
        }
        
        .message-sender {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--primary);
        }
        
        .message-time {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.25rem;
            text-align: right;
        }
        
        .message.received .message-time {
            color: var(--text-muted);
        }
        
        .date-separator {
            text-align: center;
            margin: 1rem 0;
        }
        
        .date-separator span {
            background: var(--bg-glass-solid);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-xl);
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            background: var(--bg-glass-solid);
            border-radius: var(--radius-xl);
            width: fit-content;
            margin-bottom: 0.5rem;
            margin-left: 1rem;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        
        .input-area {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-shrink: 0;
        }
        
        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        
        .attach-btn:hover {
            color: var(--primary);
        }
        
        .message-input {
            flex: 1;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .message-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 85;
            display: none;
        }
        
        .sidebar-overlay.show {
            display: block;
        }
        
        .linkified {
            color: inherit;
            text-decoration: underline;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .badge-blue { color: #3B82F6; margin-left: 0.25rem; }
        .badge-gold { color: #F59E0B; margin-left: 0.25rem; }
        .badge-admin { color: #8B5CF6; margin-left: 0.25rem; }
        
        @media (max-width: 768px) {
            .members-sidebar {
                width: 100%;
                top: 60px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="navbar">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="group-info" id="groupInfoBtn">
        <div class="group-avatar" id="groupAvatar">
            <i class="fas fa-users"></i>
        </div>
        <div class="group-name-section">
            <div class="group-name" id="groupName">Loading...</div>
            <div class="group-members-count" id="membersCount">0 members</div>
        </div>
    </div>
    <div class="chat-actions">
        <i class="fas fa-users" id="membersBtn"></i>
    </div>
</div>

<div class="main-layout">
    <div class="messages-container" id="messagesContainer">
        <div style="text-align: center; padding: 2rem;">
            <i class="fas fa-spinner fa-spin"></i> Loading messages...
        </div>
    </div>
    
    <div class="members-sidebar" id="membersSidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-users"></i> Members</h4>
            <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="members-list" id="membersList">
            <div style="text-align: center; padding: 1rem;">Loading members...</div>
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div id="typingIndicator" style="display: none;">
    <div class="typing-indicator">
        <span></span><span></span><span></span>
        <span style="margin-left: 0.5rem; font-size: 0.7rem;">Someone is typing...</span>
    </div>
</div>

<div class="input-area">
    <button class="attach-btn" id="attachBtn"><i class="fas fa-image"></i></button>
    <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentUser = null;
    let groupId = null;
    let group = null;
    let members = [];
    let messages = [];
    let isLoading = false;
    let hasMore = true;
    let typingTimeout = null;
    let isTyping = false;
    
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const groupName = document.getElementById('groupName');
    const membersCount = document.getElementById('membersCount');
    const membersBtn = document.getElementById('membersBtn');
    const membersSidebar = document.getElementById('membersSidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const groupInfoBtn = document.getElementById('groupInfoBtn');
    const attachBtn = document.getElementById('attachBtn');
    const typingIndicatorDiv = document.getElementById('typingIndicator');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function linkify(text) {
        if (!text) return '';
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="linkified">${url}</a>`;
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime(date) {
        return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function formatDate(date) {
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        const msgDate = new Date(date);
        
        if (msgDate.toDateString() === today.toDateString()) return 'Today';
        if (msgDate.toDateString() === yesterday.toDateString()) return 'Yesterday';
        return msgDate.toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    function getGroupId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }
    
    async function loadGroup() {
        groupId = getGroupId();
        if (!groupId) {
            showToast('No group specified', 'error');
            setTimeout(() => window.location.href = 'groups.html', 1500);
            return false;
        }
        
        const { data, error } = await _supabase
            .from('groups')
            .select('*')
            .eq('id', groupId)
            .single();
        
        if (error) {
            showToast('Group not found', 'error');
            setTimeout(() => window.location.href = 'groups.html', 1500);
            return false;
        }
        
        group = data;
        groupName.innerHTML = `<i class="fas fa-hashtag"></i> ${escapeHtml(group.name)}`;
        
        return true;
    }
    
    async function loadMembers() {
        const { data, error } = await _supabase
            .from('group_members')
            .select('user_id, role, joined_at')
            .eq('group_id', groupId);
        
        if (error) return;
        
        const userIds = data.map(m => m.user_id);
        const { data: users } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .in('id', userIds);
        
        const userMap = {};
        users.forEach(u => userMap[u.id] = u);
        
        members = data.map(member => ({
            ...member,
            user: userMap[member.user_id]
        }));
        
        membersCount.textContent = `${members.length} members`;
        
        const membersList = document.getElementById('membersList');
        membersList.innerHTML = members.map(member => {
            const user = member.user;
            if (!user) return '';
            const displayName = user.display_name || user.username;
            const avatarInitial = displayName.charAt(0).toUpperCase();
            const badgeIcon = getBadgeIcon(user.verification_badge);
            const roleText = member.role === 'admin' ? 'Admin' : (member.role === 'moderator' ? 'Moderator' : 'Member');
            
            return `
                <div class="member-item" data-user-id="${user.id}">
                    <div class="member-avatar">
                        ${user.avatar_url ? `<img src="${user.avatar_url}">` : avatarInitial}
                    </div>
                    <div class="member-info">
                        <div class="member-name">
                            ${escapeHtml(displayName)} ${badgeIcon}
                            ${member.role === 'admin' ? '<span class="member-role"><i class="fas fa-crown"></i></span>' : ''}
                        </div>
                        <div class="member-role" style="font-size: 0.7rem; color: var(--text-muted);">${roleText}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.member-item').forEach(item => {
            item.addEventListener('click', () => {
                const userId = item.dataset.userId;
                if (userId && userId !== currentUserId) {
                    window.location.href = `profile.html?id=${userId}`;
                }
            });
        });
        
        return members;
    }
    
    async function loadMessages(loadMore = false) {
        if (isLoading) return;
        isLoading = true;
        
        let query = _supabase
            .from('group_messages')
            .select('*')
            .eq('group_id', groupId)
            .eq('is_deleted', false)
            .order('created_at', { ascending: false })
            .limit(50);
        
        if (loadMore && messages.length > 0) {
            const oldestDate = messages[0]?.created_at;
            if (oldestDate) {
                query = query.lt('created_at', oldestDate);
            }
        }
        
        const { data, error } = await query;
        
        if (error) {
            isLoading = false;
            return;
        }
        
        const newMessages = data.reverse();
        
        if (loadMore) {
            messages = [...newMessages, ...messages];
        } else {
            messages = newMessages;
        }
        
        hasMore = data.length === 50;
        isLoading = false;
        
        await renderMessages();
        
        if (!loadMore) {
            scrollToBottom();
        }
    }
    
    async function fetchUserInfo(userId) {
        const { data } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .eq('id', userId)
            .single();
        return data;
    }
    
    async function renderMessages() {
        if (messages.length === 0) {
            messagesContainer.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                    <i class="fas fa-comment-dots" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
                    <p>No messages yet</p>
                    <p style="font-size: 0.875rem; margin-top: 0.5rem;">Be the first to send a message!</p>
                </div>
            `;
            return;
        }
        
        const userIds = [...new Set(messages.map(m => m.sender_id))];
        const userMap = {};
        for (const id of userIds) {
            userMap[id] = await fetchUserInfo(id);
        }
        
        let lastDate = null;
        let html = '';
        
        for (const msg of messages) {
            const msgDate = formatDate(msg.created_at);
            if (msgDate !== lastDate) {
                html += `<div class="date-separator"><span>${msgDate}</span></div>`;
                lastDate = msgDate;
            }
            
            const isSent = msg.sender_id === currentUserId;
            const sender = userMap[msg.sender_id];
            const senderName = sender?.display_name || sender?.username || 'User';
            const time = formatTime(msg.created_at);
            
            html += `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="message-bubble">
                        ${!isSent ? `<div class="message-sender">${escapeHtml(senderName)}</div>` : ''}
                        <div>${linkify(escapeHtml(msg.content))}</div>
                        ${msg.image_url ? `<img src="${msg.image_url}" class="message-image" style="max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 0.5rem; cursor: pointer;" onclick="window.open('${msg.image_url}', '_blank')">` : ''}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        
        messagesContainer.innerHTML = html;
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    async function sendMessage() {
        const content = messageInput.value.trim();
        if (!content) return;
        
        const tempId = 'temp_' + Date.now();
        const tempMessage = {
            id: tempId,
            group_id: groupId,
            sender_id: currentUserId,
            content: content,
            created_at: new Date().toISOString(),
            is_deleted: false
        };
        
        messages.push(tempMessage);
        await renderMessages();
        scrollToBottom();
        
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        const { error } = await _supabase
            .from('group_messages')
            .insert({
                group_id: groupId,
                sender_id: currentUserId,
                content: content,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            showToast('Failed to send message', 'error');
            messages = messages.filter(m => m.id !== tempId);
            await renderMessages();
        }
    }
    
    async function sendImage(file) {
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            showToast('Please select an image file', 'error');
            return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
            showToast('Image must be less than 5MB', 'error');
            return;
        }
        
        const fileExt = file.name.split('.').pop();
        const fileName = `group_${groupId}_${Date.now()}.${fileExt}`;
        
        const { error: uploadError } = await _supabase.storage
            .from('chat-images')
            .upload(fileName, file);
        
        if (uploadError) {
            showToast('Upload failed', 'error');
            return;
        }
        
        const { data: { publicUrl } } = _supabase.storage
            .from('chat-images')
            .getPublicUrl(fileName);
        
        const { error } = await _supabase
            .from('group_messages')
            .insert({
                group_id: groupId,
                sender_id: currentUserId,
                content: '📷 Image',
                image_url: publicUrl,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            showToast('Failed to send image', 'error');
        }
    }
    
    function sendTypingIndicator() {
        if (!isTyping) {
            isTyping = true;
            _supabase.channel(`group_typing_${groupId}`).send({
                type: 'broadcast',
                event: 'typing',
                payload: { user_id: currentUserId, is_typing: true }
            });
        }
        
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
            _supabase.channel(`group_typing_${groupId}`).send({
                type: 'broadcast',
                event: 'typing',
                payload: { user_id: currentUserId, is_typing: false }
            });
        }, 1000);
    }
    
    messageInput.addEventListener('input', () => {
        sendTypingIndicator();
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
    });
    
    function subscribeToTyping() {
        const channel = _supabase.channel(`group_typing_${groupId}`);
        channel.on('broadcast', { event: 'typing' }, (payload) => {
            if (payload.payload.user_id !== currentUserId) {
                if (payload.payload.is_typing) {
                    typingIndicatorDiv.style.display = 'block';
                    setTimeout(() => {
                        typingIndicatorDiv.style.display = 'none';
                    }, 2000);
                }
            }
        }).subscribe();
    }
    
    function subscribeToMessages() {
        _supabase
            .channel(`group_messages_${groupId}`)
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'group_messages',
                filter: `group_id=eq.${groupId}`
            }, (payload) => {
                loadMessages();
                scrollToBottom();
            })
            .subscribe();
    }
    
    messagesContainer.addEventListener('scroll', () => {
        if (messagesContainer.scrollTop < 100 && hasMore && !isLoading) {
            loadMessages(true);
        }
    });
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    backBtn.addEventListener('click', () => {
        window.location.href = 'groups.html';
    });
    
    groupInfoBtn.addEventListener('click', () => {
        window.location.href = `groups.html?id=${groupId}`;
    });
    
    membersBtn.addEventListener('click', () => {
        membersSidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    });
    
    closeSidebar.addEventListener('click', () => {
        membersSidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    });
    
    sidebarOverlay.addEventListener('click', () => {
        membersSidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    });
    
    attachBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) sendImage(file);
        };
        input.click();
    });
    
    async function init() {
        if (!await checkAuth()) return;
        if (!await loadGroup()) return;
        await loadMembers();
        await loadMessages();
        subscribeToMessages();
        subscribeToTyping();
    }
    
    init();
})();
</script>
</body>
</html>
