<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
            position: relative;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .profile-header {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
            font-weight: 600;
            color: white;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-edit-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem;
            text-align: center;
            font-size: 0.7rem;
            transform: translateY(100%);
            transition: transform 0.2s;
        }
        
        .profile-avatar:hover .avatar-edit-overlay {
            transform: translateY(0);
        }
        
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        
        .profile-username {
            color: var(--text-muted);
            margin: 0.5rem 0;
            font-size: 0.875rem;
        }
        
        .profile-bio {
            color: var(--text-secondary);
            margin: 1rem 0;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .edit-profile-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.625rem 1.5rem;
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
        }
        
        .settings-btn {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 0.625rem 1.5rem;
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
        }
        
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
        }
        
        .post-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .post-header {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .post-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .post-content {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            word-break: break-word;
        }
        
        .post-stats {
            display: flex;
            gap: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 0.5rem;
        }
        
        .post-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .delete-post {
            color: var(--error);
            cursor: pointer;
            margin-left: auto;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .badge-blue {
            color: #3B82F6;
            margin-left: 0.25rem;
        }
        
        .badge-gold {
            color: #F59E0B;
            margin-left: 0.25rem;
        }
        
        .badge-admin {
            color: #8B5CF6;
            margin-left: 0.25rem;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .file-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .modal-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<div class="container">
    <div class="profile-header">
        <div class="profile-avatar" id="avatarClick">
            <span id="avatarText">?</span>
            <div class="avatar-edit-overlay" id="editAvatarBtn">
                <i class="fas fa-camera"></i> Change
            </div>
        </div>
        <div class="profile-name">
            <span id="displayName">Loading...</span>
            <span id="badgeContainer"></span>
        </div>
        <div class="profile-username" id="username">@loading</div>
        <div class="profile-bio" id="bio">Loading...</div>
        <div class="profile-stats">
            <div class="stat-item">
                <div class="stat-number" id="postsCount">0</div>
                <div class="stat-label">Posts</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="followersCount">0</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="followingCount">0</div>
                <div class="stat-label">Following</div>
            </div>
        </div>
        <div class="action-buttons">
            <button class="edit-profile-btn" id="editProfileBtn">Edit Profile</button>
            <button class="settings-btn" id="settingsBtn"><i class="fas fa-gear"></i> Settings</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" id="tabPosts"><i class="fas fa-newspaper"></i> Posts</button>
        <button class="tab" id="tabLikes"><i class="fas fa-heart"></i> Likes</button>
    </div>
    
    <div id="postsContainer">
        <div style="text-align: center; padding: 2rem;">
            <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item active" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<!-- Avatar Upload Modal -->
<div class="modal" id="avatarModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-camera"></i> Update Avatar</h3>
            <button class="modal-close" id="closeAvatarModal">&times;</button>
        </div>
        <input type="file" id="avatarInput" class="file-input" accept="image/jpeg,image/png,image/webp">
        <button class="modal-btn" id="uploadAvatarBtn">Upload</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentUser = null;
    let activeTab = 'posts';
    
    const postsContainer = document.getElementById('postsContainer');
    const displayNameSpan = document.getElementById('displayName');
    const usernameSpan = document.getElementById('username');
    const bioSpan = document.getElementById('bio');
    const postsCountSpan = document.getElementById('postsCount');
    const followersCountSpan = document.getElementById('followersCount');
    const followingCountSpan = document.getElementById('followingCount');
    const badgeContainer = document.getElementById('badgeContainer');
    const avatarText = document.getElementById('avatarText');
    const notificationIcon = document.getElementById('notificationIcon');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    // Helper function to display avatar
    function displayAvatar(container, avatarUrl, name) {
        if (!container) return;
        
        if (avatarUrl && avatarUrl.startsWith('http')) {
            container.innerHTML = `<img src="${avatarUrl}" alt="avatar" onerror="this.onerror=null; this.parentElement.innerHTML='${escapeHtml(name.charAt(0).toUpperCase())}';">`;
        } else {
            const initial = (name || 'U').charAt(0).toUpperCase();
            container.innerHTML = initial;
        }
    }
    
    async function updateNotificationBadge() {
        if (!currentUserId) return;
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    async function loadUserProfile() {
        const { data, error } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        if (error) return false;
        
        currentUser = data;
        
        displayNameSpan.textContent = data.display_name || data.username;
        usernameSpan.textContent = '@' + data.username;
        bioSpan.textContent = data.bio || 'No bio yet. Click edit to add one!';
        badgeContainer.innerHTML = getBadgeIcon(data.verification_badge);
        
        // Display avatar
        displayAvatar(avatarText, data.avatar_url, data.display_name || data.username);
        
        return true;
    }
    
    async function loadUserPosts() {
        const { data, error } = await _supabase
            .from('posts')
            .select('*')
            .eq('user_id', currentUserId)
            .eq('status', 'active')
            .order('created_at', { ascending: false });
        
        if (error) return [];
        return data;
    }
    
    async function loadUserLikes() {
        const { data } = await _supabase
            .from('likes')
            .select('post_id')
            .eq('user_id', currentUserId);
        
        if (!data || data.length === 0) return [];
        
        const postIds = data.map(like => like.post_id).filter(id => id);
        const { data: posts } = await _supabase
            .from('posts')
            .select('*')
            .in('id', postIds)
            .eq('status', 'active')
            .order('created_at', { ascending: false });
        
        return posts || [];
    }
    
    async function fetchFollowStats() {
        const { count: followers } = await _supabase
            .from('followers')
            .select('*', { count: 'exact', head: true })
            .eq('following_id', currentUserId);
        
        const { count: following } = await _supabase
            .from('followers')
            .select('*', { count: 'exact', head: true })
            .eq('follower_id', currentUserId);
        
        followersCountSpan.textContent = followers || 0;
        followingCountSpan.textContent = following || 0;
    }
    
    async function deletePost(postId) {
        if (!confirm('Delete this post?')) return;
        await _supabase.from('posts').update({ status: 'deleted' }).eq('id', postId);
        showToast('Post deleted', 'success');
        await refreshContent();
    }
    
    async function renderPosts(posts, isLikesTab = false) {
        if (!posts || posts.length === 0) {
            postsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i><p>No posts yet</p></div>';
            return;
        }
        
        postsContainer.innerHTML = '';
        
        for (const post of posts) {
            // Get author info (for likes tab, we need the original post author)
            const { data: author } = await _supabase
                .from('users')
                .select('id, username, display_name, avatar_url, verification_badge')
                .eq('id', post.user_id)
                .single();
            
            const displayName = author?.display_name || author?.username || 'User';
            const avatarInitial = displayName.charAt(0).toUpperCase();
            const badgeIcon = getBadgeIcon(author?.verification_badge);
            
            const postCard = document.createElement('div');
            postCard.className = 'post-card';
            postCard.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar" id="post-avatar-${post.id}"></div>
                    <div class="post-user-info">
                        <div class="post-username">
                            ${escapeHtml(displayName)} ${badgeIcon}
                            <span class="post-time">${formatTimeAgo(post.created_at)}</span>
                        </div>
                    </div>
                    <div class="delete-post" data-post-id="${post.id}"><i class="fas fa-trash"></i></div>
                </div>
                ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                <div class="post-content">${escapeHtml(post.content)}</div>
                ${post.image_url ? `<img src="${post.image_url}" class="post-image" style="max-width: 100%; border-radius: 12px; margin-top: 0.5rem; cursor: pointer;" onclick="window.open('${post.image_url}', '_blank')">` : ''}
                <div class="post-stats">
                    <div class="post-stat"><i class="fas fa-heart"></i> ${post.like_count || 0}</div>
                    <div class="post-stat"><i class="fas fa-comment"></i> ${post.comment_count || 0}</div>
                </div>
            `;
            postsContainer.appendChild(postCard);
            
            // Set avatar for this post
            const avatarContainer = document.getElementById(`post-avatar-${post.id}`);
            if (avatarContainer) {
                displayAvatar(avatarContainer, author?.avatar_url, displayName);
            }
        }
        
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', () => deletePost(btn.dataset.postId));
        });
    }
    
    async function refreshContent() {
        postsContainer.innerHTML = '<div style="text-align: center; padding: 2rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
        
        if (activeTab === 'posts') {
            const posts = await loadUserPosts();
            postsCountSpan.textContent = posts.length;
            await renderPosts(posts);
        } else {
            const likedPosts = await loadUserLikes();
            postsCountSpan.textContent = likedPosts.length;
            await renderPosts(likedPosts, true);
        }
    }
    
    async function uploadAvatar(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${currentUserId}_${Date.now()}.${fileExt}`;
        
        const { error: uploadError } = await _supabase.storage
            .from('avatars')
            .upload(fileName, file);
        
        if (uploadError) {
            showToast('Upload failed: ' + uploadError.message, 'error');
            return null;
        }
        
        const { data: { publicUrl } } = _supabase.storage
            .from('avatars')
            .getPublicUrl(fileName);
        
        const { error: updateError } = await _supabase
            .from('users')
            .update({ avatar_url: publicUrl })
            .eq('id', currentUserId);
        
        if (updateError) {
            showToast('Failed to update avatar', 'error');
            return null;
        }
        
        return publicUrl;
    }
    
    // Tab switching
    document.getElementById('tabPosts')?.addEventListener('click', () => {
        activeTab = 'posts';
        document.getElementById('tabPosts').classList.add('active');
        document.getElementById('tabLikes').classList.remove('active');
        refreshContent();
    });
    
    document.getElementById('tabLikes')?.addEventListener('click', () => {
        activeTab = 'likes';
        document.getElementById('tabLikes').classList.add('active');
        document.getElementById('tabPosts').classList.remove('active');
        refreshContent();
    });
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => window.location.href = 'home.html');
    document.getElementById('editProfileBtn')?.addEventListener('click', () => window.location.href = 'edit-profile.html');
    document.getElementById('settingsBtn')?.addEventListener('click', () => window.location.href = 'settings.html');
    notificationIcon?.addEventListener('click', () => window.location.href = 'notifications.html');
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    // Avatar modal
    const avatarModal = document.getElementById('avatarModal');
    document.getElementById('editAvatarBtn')?.addEventListener('click', () => {
        avatarModal.classList.add('show');
    });
    document.getElementById('avatarClick')?.addEventListener('click', () => {
        avatarModal.classList.add('show');
    });
    document.getElementById('closeAvatarModal')?.addEventListener('click', () => {
        avatarModal.classList.remove('show');
    });
    document.getElementById('uploadAvatarBtn')?.addEventListener('click', async () => {
        const file = document.getElementById('avatarInput').files[0];
        if (!file) {
            showToast('Please select an image', 'warning');
            return;
        }
        
        if (!file.type.startsWith('image/')) {
            showToast('Please select an image file', 'error');
            return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
            showToast('Image must be less than 5MB', 'error');
            return;
        }
        
        const avatarUrl = await uploadAvatar(file);
        if (avatarUrl) {
            showToast('Avatar updated!', 'success');
            displayAvatar(avatarText, avatarUrl, currentUser?.display_name || currentUser?.username);
            avatarModal.classList.remove('show');
            document.getElementById('avatarInput').value = '';
        }
    });
    
    async function init() {
        if (!await checkAuth()) return;
        await loadUserProfile();
        await fetchFollowStats();
        await refreshContent();
        await updateNotificationBadge();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
