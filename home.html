<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Home - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --info: #8B5CF6;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
            --primary: #2563EB;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .broadcast-banner {
            background: linear-gradient(135deg, var(--primary-soft), rgba(139, 92, 246, 0.1));
            border-left: 4px solid var(--primary);
            border-radius: var(--radius-xl);
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
            position: relative;
        }
        
        .broadcast-banner.show { display: block; }
        .broadcast-close {
            position: absolute;
            right: 0.75rem;
            top: 0.75rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-muted);
        }
        .broadcast-title { font-weight: 700; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .broadcast-content { font-size: 0.875rem; color: var(--text-secondary); }
        
        .channels-section { margin-bottom: 1.5rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-title { font-weight: 600; font-size: 1rem; }
        .channel-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .channel-recommend-card {
            min-width: 180px;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .channel-recommend-card:hover { border-color: var(--primary-soft); transform: translateY(-2px); }
        .recommend-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .recommend-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .recommend-name { font-weight: 600; font-size: 0.875rem; }
        .recommend-stats { font-size: 0.7rem; color: var(--text-muted); }
        
        .create-post-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .create-post-card:hover { border-color: var(--primary-soft); background: var(--bg-glass-hover); }
        .create-post-header { display: flex; gap: 0.75rem; align-items: center; }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-input {
            flex: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.875rem 1rem;
            color: var(--text-primary);
        }
        .post-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-subtle);
        }
        .post-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .post-action:hover { color: var(--primary); }
        
        .post-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .post-card:hover { border-color: var(--primary-soft); }
        .post-header { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
        .post-user-info { flex: 1; }
        .post-username { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .post-time { font-size: 0.7rem; color: var(--text-muted); font-weight: normal; }
        .post-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
        .post-content { color: var(--text-secondary); margin-bottom: 0.75rem; word-break: break-word; line-height: 1.5; }
        .post-image { max-width: 100%; border-radius: var(--radius-lg); margin-bottom: 0.75rem; cursor: pointer; }
        .post-stats { display: flex; gap: 1rem; padding: 0.5rem 0; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); margin: 0.75rem 0; }
        .post-stat { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-muted); }
        .post-interactions { display: flex; gap: 1rem; }
        .interaction-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: transparent;
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .interaction-btn:hover { background: var(--bg-glass); }
        .interaction-btn.liked { color: var(--error); }
        
        .comments-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-subtle); display: none; }
        .comments-section.show { display: block; }
        .comment { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
        .comment-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        .comment-content { flex: 1; background: var(--bg-glass); padding: 0.5rem 0.75rem; border-radius: var(--radius-lg); }
        .comment-username { font-weight: 600; font-size: 0.75rem; }
        .comment-text { font-size: 0.875rem; color: var(--text-secondary); }
        .comment-input-wrapper { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .comment-input { flex: 1; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-xl); padding: 0.5rem 0.875rem; color: var(--text-primary); }
        .comment-submit { background: var(--primary); border: none; border-radius: var(--radius-xl); padding: 0.5rem 1rem; color: white; cursor: pointer; }
        
        .linkified { color: var(--primary); text-decoration: none; }
        .linkified:hover { text-decoration: underline; }
        
        .badge-blue { color: #3B82F6; margin-left: 0.25rem; }
        .badge-gold { color: #F59E0B; margin-left: 0.25rem; }
        .badge-admin { color: #8B5CF6; margin-left: 0.25rem; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .nav-item.active { color: var(--primary); background: var(--primary-soft); }
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.7rem; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.25rem; cursor: pointer; }
        .modal-input, .modal-textarea {
            width: 100%;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 0.75rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-family: inherit;
        }
        .modal-textarea { min-height: 120px; resize: vertical; }
        .image-upload-area {
            border: 2px dashed var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .image-upload-area:hover { border-color: var(--primary); background: var(--primary-soft); }
        .image-preview { margin-bottom: 1rem; position: relative; display: none; }
        .image-preview img { width: 100%; border-radius: var(--radius-lg); max-height: 200px; object-fit: cover; }
        .remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: white;
            cursor: pointer;
        }
        .modal-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.5; }
        .skeleton { background: var(--bg-glass); border-radius: var(--radius-2xl); padding: 1rem; margin-bottom: 1rem; }
        .skeleton-avatar { width: 44px; height: 44px; background: var(--border-glass); border-radius: 50%; margin-bottom: 12px; }
        .skeleton-line { height: 12px; background: var(--border-glass); border-radius: 6px; margin-bottom: 8px; }
        
        @media (min-width: 768px) { .bottom-nav { display: none; } }
        @media (max-width: 767px) { .navbar .nav-icons { display: none; } }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <div class="logo" id="logo"><i class="fas fa-bolt"></i> ZERØBYTE</div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-user" id="profileIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<div class="container">
    <div class="broadcast-banner" id="broadcastBanner">
        <button class="broadcast-close" id="closeBroadcast">&times;</button>
        <div class="broadcast-title" id="broadcastTitle"><i class="fas fa-bullhorn"></i> Announcement</div>
        <div class="broadcast-content" id="broadcastContent"></div>
    </div>
    
    <div class="channels-section">
        <div class="section-header">
            <span class="section-title"><i class="fas fa-fire"></i> Recommended Channels</span>
            <span style="font-size: 0.75rem; color: var(--text-muted); cursor: pointer;" id="viewAllChannels">View all →</span>
        </div>
        <div class="channel-scroll" id="channelRecommendations"><div style="padding: 1rem; text-align: center;">Loading...</div></div>
    </div>
    
    <div class="create-post-card" id="createPostCard">
        <div class="create-post-header">
            <div class="avatar" id="userAvatar">?</div>
            <div class="post-input" id="openCreatePostModal">What's on your mind?</div>
        </div>
        <div class="post-actions">
            <div class="post-action" id="openCreatePostModalBtn"><i class="fas fa-image"></i> <span>Photo</span></div>
        </div>
    </div>
    
    <div id="feedContainer">
        <div class="skeleton"><div class="skeleton-avatar"></div><div class="skeleton-line medium"></div><div class="skeleton-line long"></div><div class="skeleton-line short"></div></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<div class="modal" id="createPostModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> Create Post</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <input type="text" id="postTitle" class="modal-input" placeholder="Title (optional)">
        <textarea id="postContent" class="modal-textarea" placeholder="What's on your mind?"></textarea>
        <div class="image-upload-area" id="imageUploadArea">
            <i class="fas fa-cloud-upload-alt" style="font-size: 1.5rem; margin-bottom: 0.5rem; display: block;"></i>
            <span>Click to add an image</span>
        </div>
        <input type="file" id="imageInput" style="display: none;" accept="image/jpeg,image/png,image/webp,image/gif">
        <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="">
            <button class="remove-image" id="removeImageBtn"><i class="fas fa-times"></i></button>
        </div>
        <button class="modal-btn" id="submitPostBtn">Post</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function linkify(text) {
        if (!text) return '';
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="linkified">${url}</a>`;
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    function displayAvatar(container, avatarUrl, name) {
        if (!container) return;
        if (avatarUrl && avatarUrl.startsWith('http')) {
            container.innerHTML = `<img src="${avatarUrl}" alt="avatar" onerror="this.onerror=null; this.parentElement.innerHTML='${escapeHtml(name.charAt(0).toUpperCase())}';">`;
        } else {
            const initial = (name || 'U').charAt(0).toUpperCase();
            container.innerHTML = initial;
        }
    }
    
    async function updateNotificationBadge() {
        if (!currentUserId) return;
        try {
            const { count } = await _supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', currentUserId).eq('is_read', false);
            const existingBadge = notificationIcon?.querySelector('.notification-badge');
            if (existingBadge) existingBadge.remove();
            if (count > 0 && notificationIcon) {
                const badge = document.createElement('span');
                badge.className = 'notification-badge';
                badge.textContent = count > 9 ? '9+' : count;
                notificationIcon.style.position = 'relative';
                notificationIcon.appendChild(badge);
            }
        } catch(e) { console.error(e); }
    }
    
    async function checkAuth() {
        try {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return false; }
            currentUserId = session.user.id;
            const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
            currentUser = user;
            displayAvatar(userAvatar, currentUser?.avatar_url, currentUser?.display_name || currentUser?.username);
            return true;
        } catch(e) { console.error(e); showToast('Connection error', 'error'); return false; }
    }
    
    async function fetchUserInfo(userId) {
        try {
            const { data } = await _supabase.from('users').select('id, username, display_name, avatar_url, verification_badge').eq('id', userId).single();
            return data;
        } catch(e) { return null; }
    }
    
    async function fetchPosts() {
        try {
            const { data, error } = await _supabase.from('posts').select('*').eq('status', 'active').order('created_at', { ascending: false }).limit(50);
            if (error) return [];
            const postsWithUsers = await Promise.all(data.map(async (post) => {
                const userInfo = await fetchUserInfo(post.user_id);
                return { ...post, user: userInfo };
            }));
            return postsWithUsers;
        } catch(e) { return []; }
    }
    
    async function fetchUserLikes() {
        try {
            const { data } = await _supabase.from('likes').select('post_id').eq('user_id', currentUserId);
            likedPosts.clear();
            if (data) data.forEach(like => likedPosts.add(like.post_id));
        } catch(e) { console.error(e); }
    }
    
    // UPDATE LIKE COUNT WITHOUT PAGE REFRESH
    async function updateLikeCount(postId, increment) {
        const likeSpan = document.querySelector(`.like-count-${postId}`);
        if (likeSpan) {
            let currentCount = parseInt(likeSpan.textContent) || 0;
            likeSpan.textContent = increment ? currentCount + 1 : currentCount - 1;
        }
    }
    
    // UPDATE COMMENT COUNT WITHOUT PAGE REFRESH
    async function updateCommentCount(postId, increment) {
        const commentSpan = document.querySelector(`.comment-count-${postId}`);
        if (commentSpan) {
            let currentCount = parseInt(commentSpan.textContent) || 0;
            commentSpan.textContent = increment ? currentCount + 1 : currentCount - 1;
        }
    }
    
    async function toggleLike(postId) {
        const isLiked = likedPosts.has(postId);
        const post = posts.find(p => p.id === postId);
        const likeBtn = document.querySelector(`.like-btn-${postId}`);
        
        try {
            if (isLiked) {
                await _supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentUserId);
                likedPosts.delete(postId);
                if (post) post.like_count = (post.like_count || 0) - 1;
                updateLikeCount(postId, false);
                if (likeBtn) {
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = '<i class="fas fa-heart"></i> Like';
                }
            } else {
                await _supabase.from('likes').insert({ post_id: postId, user_id: currentUserId });
                likedPosts.add(postId);
                if (post) post.like_count = (post.like_count || 0) + 1;
                updateLikeCount(postId, true);
                if (likeBtn) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '<i class="fas fa-heart"></i> Liked';
                }
                
                if (post && post.user_id !== currentUserId) {
                    await _supabase.from('notifications').insert({
                        user_id: post.user_id,
                        type: 'like',
                        actor_id: currentUserId,
                        target_id: postId,
                        target_type: 'post',
                        content: `${currentUser?.display_name || 'Someone'} liked your post`,
                        created_at: new Date().toISOString()
                    });
                    updateNotificationBadge();
                }
            }
        } catch(e) {
            console.error('Toggle like error:', e);
            showToast('Failed to update like', 'error');
        }
    }
    
    async function addComment(postId, content) {
        if (!content.trim()) return;
        
        const post = posts.find(p => p.id === postId);
        const commentInput = document.querySelector(`.comment-input-${postId}`);
        const commentsSection = document.querySelector(`.comments-section-${postId}`);
        
        try {
            const { error } = await _supabase
                .from('comments')
                .insert({
                    post_id: postId,
                    user_id: currentUserId,
                    content: content.trim(),
                    created_at: new Date().toISOString()
                });
            
            if (!error) {
                if (post) post.comment_count = (post.comment_count || 0) + 1;
                updateCommentCount(postId, true);
                
                // Add the new comment to the UI dynamically
                const newComment = document.createElement('div');
                newComment.className = 'comment';
                const avatarInitial = (currentUser?.display_name || currentUser?.username || 'U').charAt(0).toUpperCase();
                newComment.innerHTML = `
                    <div class="comment-avatar">${avatarInitial}</div>
                    <div class="comment-content">
                        <div class="comment-username">${escapeHtml(currentUser?.display_name || currentUser?.username || 'User')}</div>
                        <div class="comment-text">${linkify(escapeHtml(content.trim()))}</div>
                    </div>
                `;
                
                if (commentsSection) {
                    const commentList = commentsSection.querySelector('.comment-list');
                    if (commentList) {
                        commentList.appendChild(newComment);
                    }
                }
                
                if (commentInput) commentInput.value = '';
                
                if (post && post.user_id !== currentUserId) {
                    await _supabase.from('notifications').insert({
                        user_id: post.user_id,
                        type: 'comment',
                        actor_id: currentUserId,
                        target_id: postId,
                        target_type: 'post',
                        content: `${currentUser?.display_name || 'Someone'} commented on your post`,
                        created_at: new Date().toISOString()
                    });
                    updateNotificationBadge();
                }
            }
        } catch(e) {
            console.error('Add comment error:', e);
            showToast('Failed to add comment', 'error');
        }
    }
    
    async function fetchComments(postId) {
        try {
            const { data } = await _supabase
                .from('comments')
                .select('*')
                .eq('post_id', postId)
                .eq('status', 'active')
                .order('created_at', { ascending: true })
                .limit(20);
            
            if (!data) return [];
            
            const commentsWithUsers = await Promise.all(data.map(async (comment) => {
                const userInfo = await fetchUserInfo(comment.user_id);
                return { ...comment, user: userInfo };
            }));
            
            return commentsWithUsers;
        } catch(e) {
            console.error('Fetch comments error:', e);
            return [];
        }
    }
    
    async function renderFeed() {
        feedContainer.innerHTML = `
            <div class="skeleton">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line short"></div>
            </div>
        `;
        
        posts = await fetchPosts();
        await fetchUserLikes();
        
        if (posts.length === 0) {
            feedContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-newspaper" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
                    <p>No posts yet. Be the first to create a post!</p>
                </div>
            `;
            return;
        }
        
        feedContainer.innerHTML = '';
        
        for (const post of posts) {
            const comments = await fetchComments(post.id);
            const isLiked = likedPosts.has(post.id);
            const badgeIcon = post.user?.verification_badge ? getBadgeIcon(post.user.verification_badge) : '';
            const displayName = post.user?.display_name || post.user?.username || 'User';
            const postCard = document.createElement('div');
            postCard.className = 'post-card';
            postCard.setAttribute('data-post-id', post.id);
            
            postCard.innerHTML = `
                <div class="post-header">
                    <div class="avatar" id="post-avatar-${post.id}" style="width: 44px; height: 44px;"></div>
                    <div class="post-user-info">
                        <div class="post-username">
                            ${escapeHtml(displayName)} ${badgeIcon}
                            <span class="post-time">${formatTimeAgo(post.created_at)}</span>
                        </div>
                    </div>
                </div>
                ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                <div class="post-content">${linkify(escapeHtml(post.content))}</div>
                ${post.image_url ? `<img src="${post.image_url}" class="post-image" onclick="window.open('${post.image_url}', '_blank')">` : ''}
                <div class="post-stats">
                    <div class="post-stat"><i class="fas fa-heart"></i> <span class="like-count-${post.id}">${post.like_count || 0}</span></div>
                    <div class="post-stat"><i class="fas fa-comment"></i> <span class="comment-count-${post.id}">${post.comment_count || 0}</span></div>
                </div>
                <div class="post-interactions">
                    <button class="interaction-btn ${isLiked ? 'liked' : ''} like-btn-${post.id}" data-action="like" data-post-id="${post.id}">
                        <i class="fas fa-heart"></i> ${isLiked ? 'Liked' : 'Like'}
                    </button>
                    <button class="interaction-btn" data-action="comment" data-post-id="${post.id}">
                        <i class="fas fa-comment"></i> Comment
                    </button>
                </div>
                <div class="comments-section comments-section-${post.id}" data-post-id="${post.id}">
                    <div class="comment-list">
                        ${comments.map(comment => `
                            <div class="comment">
                                <div class="comment-avatar" id="comment-avatar-${comment.id}"></div>
                                <div class="comment-content">
                                    <div class="comment-username">${escapeHtml(comment.user?.display_name || comment.user?.username || 'User')}</div>
                                    <div class="comment-text">${linkify(escapeHtml(comment.content))}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="comment-input-wrapper">
                        <input type="text" class="comment-input comment-input-${post.id}" placeholder="Write a comment..." data-post-id="${post.id}">
                        <button class="comment-submit" data-post-id="${post.id}">Post</button>
                    </div>
                </div>
            `;
            
            feedContainer.appendChild(postCard);
            
            const postAvatar = document.getElementById(`post-avatar-${post.id}`);
            if (postAvatar) {
                displayAvatar(postAvatar, post.user?.avatar_url, displayName);
            }
            
            comments.forEach(comment => {
                const commentAvatar = document.getElementById(`comment-avatar-${comment.id}`);
                if (commentAvatar && comment.user) {
                    displayAvatar(commentAvatar, comment.user.avatar_url, comment.user.display_name || comment.user.username);
                }
            });
        }
        
        // Add event listeners - PREVENT PAGE REFRESH
        document.querySelectorAll('.interaction-btn[data-action="like"]').forEach(btn => {
            btn.removeEventListener('click', handleLikeClick);
            btn.addEventListener('click', handleLikeClick);
        });
        
        document.querySelectorAll('.interaction-btn[data-action="comment"]').forEach(btn => {
            btn.removeEventListener('click', handleCommentToggle);
            btn.addEventListener('click', handleCommentToggle);
        });
        
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.removeEventListener('click', handleCommentSubmit);
            btn.addEventListener('click', handleCommentSubmit);
        });
        
        document.querySelectorAll('.comment-input').forEach(input => {
            input.removeEventListener('keypress', handleCommentKeypress);
            input.addEventListener('keypress', handleCommentKeypress);
        });
    }
    
    // Event handler functions to prevent page refresh
    function handleLikeClick(e) {
        e.preventDefault();
        e.stopPropagation();
        const postId = this.dataset.postId;
        toggleLike(postId);
    }
    
    function handleCommentToggle(e) {
        e.preventDefault();
        e.stopPropagation();
        const postId = this.dataset.postId;
        const section = document.querySelector(`.comments-section-${postId}`);
        if (section) section.classList.toggle('show');
    }
    
    function handleCommentSubmit(e) {
        e.preventDefault();
        e.stopPropagation();
        const postId = this.dataset.postId;
        const input = document.querySelector(`.comment-input-${postId}`);
        if (input && input.value.trim()) {
            addComment(postId, input.value);
        }
    }
    
    function handleCommentKeypress(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            e.stopPropagation();
            const postId = this.dataset.postId;
            if (this.value.trim()) {
                addComment(postId, this.value);
            }
        }
    }
    
    async function uploadImage(file) {
        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `${currentUserId}_${Date.now()}.${fileExt}`;
            const { error: uploadError } = await _supabase.storage.from('post-images').upload(fileName, file);
            if (uploadError) return null;
            const { data: { publicUrl } } = _supabase.storage.from('post-images').getPublicUrl(fileName);
            return publicUrl;
        } catch(e) { return null; }
    }
    
    async function createPost() {
        const content = postContent.value.trim();
        if (!content) {
            showToast('Please enter some content', 'warning');
            return;
        }
        
        submitPostBtn.disabled = true;
        submitPostBtn.textContent = 'Posting...';
        
        let imageUrl = null;
        if (selectedImageFile) {
            imageUrl = await uploadImage(selectedImageFile);
            if (imageUrl) showToast('Image uploaded!', 'success');
            else showToast('Failed to upload image', 'error');
        }
        
        try {
            const { error } = await _supabase.from('posts').insert({
                user_id: currentUserId,
                title: postTitle.value.trim() || null,
                content: content,
                image_url: imageUrl,
                created_at: new Date().toISOString()
            });
            
            if (error) {
                showToast('Failed to create post', 'error');
            } else {
                showToast('Post created!', 'success');
                postTitle.value = '';
                postContent.value = '';
                selectedImageFile = null;
                imageInput.value = '';
                imagePreview.style.display = 'none';
                imageUploadArea.style.display = 'block';
                createPostModal.classList.remove('show');
                await renderFeed();
            }
        } catch(e) {
            showToast('Network error', 'error');
        } finally {
            submitPostBtn.disabled = false;
            submitPostBtn.textContent = 'Post';
        }
    }
    
    imageUploadArea?.addEventListener('click', () => imageInput.click());
    imageInput?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('Image must be less than 5MB', 'error');
                return;
            }
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.style.display = 'block';
                imageUploadArea.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });
    
    removeImageBtn?.addEventListener('click', () => {
        selectedImageFile = null;
        imageInput.value = '';
        imagePreview.style.display = 'none';
        imageUploadArea.style.display = 'block';
    });
    
    async function loadBroadcast() {
        try {
            const { data, error } = await _supabase.from('broadcasts').select('*').order('created_at', { ascending: false }).limit(1);
            if (error) return;
            if (data && data.length > 0) {
                const lastSeen = localStorage.getItem('lastBroadcastId');
                if (lastSeen !== data[0].id) {
                    broadcastTitle.innerHTML = `<i class="fas fa-bullhorn"></i> ${escapeHtml(data[0].title)}`;
                    broadcastContent.textContent = data[0].content;
                    broadcastBanner.classList.add('show');
                }
            }
        } catch(e) { console.error(e); }
    }
    
    closeBroadcast?.addEventListener('click', () => {
        broadcastBanner.classList.remove('show');
        localStorage.setItem('lastBroadcastId', 'seen');
    });
    
    async function loadChannelRecommendations() {
        try {
            const { data, error } = await _supabase.from('channels').select('*').eq('status', 'active').order('member_count', { ascending: false }).limit(5);
            if (error || !data || data.length === 0) {
                channelRecommendations.innerHTML = '<div style="padding: 1rem; text-align: center;">No channels available</div>';
                return;
            }
            const icons = { page: 'fa-newspaper', broadcast: 'fa-bullhorn', feed: 'fa-rss' };
            channelRecommendations.innerHTML = data.map(channel => {
                const icon = icons[channel.type] || 'fa-hashtag';
                return `
                    <div class="channel-recommend-card" data-channel-id="${channel.id}">
                        <div class="recommend-header">
                            <div class="recommend-icon"><i class="fas ${icon}"></i></div>
                            <div class="recommend-name">${escapeHtml(channel.name)}</div>
                        </div>
                        <div class="recommend-stats">
                            <i class="fas fa-users"></i> ${channel.member_count || 0} followers
                        </div>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.channel-recommend-card').forEach(card => {
                card.addEventListener('click', () => window.location.href = `channel-view.html?id=${card.dataset.channelId}`);
            });
        } catch(e) { console.error(e); }
    }
    
    viewAllChannels?.addEventListener('click', () => window.location.href = 'channels.html');
    
    document.getElementById('openCreatePostModal')?.addEventListener('click', () => {
        selectedImageFile = null;
        imageInput.value = '';
        imagePreview.style.display = 'none';
        imageUploadArea.style.display = 'block';
        createPostModal.classList.add('show');
    });
    document.getElementById('openCreatePostModalBtn')?.addEventListener('click', () => {
        selectedImageFile = null;
        imageInput.value = '';
        imagePreview.style.display = 'none';
        imageUploadArea.style.display = 'block';
        createPostModal.classList.add('show');
    });
    document.getElementById('closeModal')?.addEventListener('click', () => createPostModal.classList.remove('show'));
    submitPostBtn?.addEventListener('click', createPost);
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    profileIcon?.addEventListener('click', () => window.location.href = 'profile.html');
    logo?.addEventListener('click', () => window.location.href = 'home.html');
    notificationIcon?.addEventListener('click', () => window.location.href = 'notifications.html');
    logoutIcon?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    function subscribeToRealtime() {
        if (!currentUserId) return;
        _supabase.channel('posts_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => renderFeed()).subscribe();
        _supabase.channel('likes_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'likes' }, () => renderFeed()).subscribe();
        _supabase.channel('comments_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, () => renderFeed()).subscribe();
        _supabase.channel('notifications_changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUserId}` }, () => updateNotificationBadge()).subscribe();
    }
    
    async function init() {
        if (!await checkAuth()) return;
        await renderFeed();
        await loadBroadcast();
        await loadChannelRecommendations();
        await updateNotificationBadge();
        subscribeToRealtime();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
