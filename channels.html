<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Channels - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           CSS VARIABLES & RESET
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --info: #8B5CF6;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
            --primary: #2563EB;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        /* ========================================
           ANIMATED BACKGROUND
        ======================================== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        /* ========================================
           NAVIGATION BAR
        ======================================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        /* ========================================
           MAIN CONTAINER
        ======================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        /* ========================================
           HEADER
        ======================================== */
        .channels-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .channels-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .create-channel-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .create-channel-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        /* ========================================
           CATEGORY TABS
        ======================================== */
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
            flex-wrap: wrap;
        }
        
        .category-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            min-width: 90px;
        }
        
        .category-tab.active {
            background: var(--primary);
            color: white;
        }
        
        /* ========================================
           SEARCH BAR
        ======================================== */
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        
        /* ========================================
           CHANNELS GRID
        ======================================== */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        
        /* ========================================
           CHANNEL CARD
        ======================================== */
        .channel-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .channel-card:hover {
            border-color: var(--primary-soft);
            transform: translateY(-4px);
        }
        
        .channel-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }
        
        .channel-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }
        
        .channel-info {
            flex: 1;
        }
        
        .channel-name {
            font-weight: 700;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
        
        .channel-type {
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: var(--radius-sm);
            background: var(--primary-soft);
            color: var(--primary);
        }
        
        .channel-type.broadcast {
            background: rgba(139, 92, 246, 0.15);
            color: var(--info);
        }
        
        .channel-type.feed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        
        .channel-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        
        .channel-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        
        .channel-stats i {
            margin-right: 0.25rem;
        }
        
        .channel-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-subtle);
        }
        
        .follow-btn {
            padding: 0.5rem 1.25rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .follow-btn.following {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
        }
        
        .follow-btn:hover {
            transform: translateY(-2px);
        }
        
        .verified-badge {
            color: var(--primary);
            margin-left: 0.25rem;
            font-size: 0.75rem;
        }
        
        /* ========================================
           EMPTY STATE
        ======================================== */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        /* ========================================
           MODAL
        ======================================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .modal-btn:hover {
            background: var(--primary-hover);
        }
        
        /* ========================================
           BOTTOM NAVIGATION
        ======================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        /* ========================================
           TOAST NOTIFICATIONS
        ======================================== */
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* ========================================
           RESPONSIVE
        ======================================== */
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
            .channels-grid {
                grid-template-columns: 1fr;
            }
            .category-tab {
                min-width: auto;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<!-- Main Container -->
<div class="container">
    <!-- Header -->
    <div class="channels-header">
        <div class="channels-title">
            <i class="fas fa-broadcast-tower"></i> Channels
        </div>
        <button class="create-channel-btn" id="createChannelBtn">
            <i class="fas fa-plus"></i>
        </button>
    </div>
    
    <!-- Category Tabs -->
    <div class="category-tabs">
        <button class="category-tab active" data-category="all">All</button>
        <button class="category-tab" data-category="page"><i class="fas fa-newspaper"></i> Page</button>
        <button class="category-tab" data-category="broadcast"><i class="fas fa-bullhorn"></i> Broadcast</button>
        <button class="category-tab" data-category="feed"><i class="fas fa-rss"></i> Feed</button>
        <button class="category-tab" data-category="my">My Channels</button>
    </div>
    
    <!-- Search Bar -->
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search channels...">
    </div>
    
    <!-- Channels Grid -->
    <div class="channels-grid" id="channelsGrid">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading channels...</p>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item active" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<!-- Create Channel Modal -->
<div class="modal" id="createChannelModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> Create Channel</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Channel Name</label>
            <input type="text" id="channelName" class="form-input" placeholder="Enter channel name">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="channelDescription" class="form-textarea" placeholder="Describe your channel..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Channel Type</label>
            <select id="channelType" class="form-select">
                <option value="page">📰 Page Channel (Anyone can post)</option>
                <option value="broadcast">📢 Broadcast Channel (Owner only posts)</option>
                <option value="feed">📡 Feed Channel (Algorithm inserted)</option>
            </select>
        </div>
        <button class="modal-btn" id="submitChannelBtn">Create Channel</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========================================
// ZERØBYTE - CHANNELS PAGE
// ========================================

(function() {
    // Supabase Configuration
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========================================
    // VARIABLES
    // ========================================
    let currentUserId = null;
    let currentUser = null;
    let currentCategory = 'all';
    let allChannels = [];
    let followedChannelIds = new Set();
    
    // DOM Elements
    const channelsGrid = document.getElementById('channelsGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryTabs = document.querySelectorAll('.category-tab');
    const createChannelBtn = document.getElementById('createChannelBtn');
    const createChannelModal = document.getElementById('createChannelModal');
    const closeModal = document.getElementById('closeModal');
    const submitChannelBtn = document.getElementById('submitChannelBtn');
    const channelNameInput = document.getElementById('channelName');
    const channelDescriptionInput = document.getElementById('channelDescription');
    const channelTypeSelect = document.getElementById('channelType');
    const notificationIcon = document.getElementById('notificationIcon');
    
    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : 
                     type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getChannelTypeIcon(type) {
        switch(type) {
            case 'page': return '<i class="fas fa-newspaper"></i>';
            case 'broadcast': return '<i class="fas fa-bullhorn"></i>';
            case 'feed': return '<i class="fas fa-rss"></i>';
            default: return '<i class="fas fa-hashtag"></i>';
        }
    }
    
    function getChannelTypeLabel(type) {
        switch(type) {
            case 'page': return 'Page';
            case 'broadcast': return 'Broadcast';
            case 'feed': return 'Feed';
            default: return type;
        }
    }
    
    async function updateNotificationBadge() {
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    // ========================================
    // AUTHENTICATION
    // ========================================
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    // ========================================
    // CHANNEL FUNCTIONS
    // ========================================
    async function loadFollowedChannels() {
        const { data, error } = await _supabase
            .from('channel_members')
            .select('channel_id')
            .eq('user_id', currentUserId);
        
        if (error) return;
        
        followedChannelIds.clear();
        data.forEach(m => followedChannelIds.add(m.channel_id));
    }
    
    async function loadChannels() {
        let query = _supabase
            .from('channels')
            .select('*')
            .eq('status', 'active')
            .order('created_at', { ascending: false });
        
        if (currentCategory !== 'all' && currentCategory !== 'my') {
            query = query.eq('type', currentCategory);
        }
        
        const { data, error } = await query;
        
        if (error) {
            channelsGrid.innerHTML = '<div class="empty-state"><i class="fas fa-broadcast-tower"></i><p>Error loading channels</p></div>';
            return;
        }
        
        allChannels = data;
        
        // Get member counts and post counts for each channel
        for (const channel of allChannels) {
            const { count: memberCount } = await _supabase
                .from('channel_members')
                .select('*', { count: 'exact', head: true })
                .eq('channel_id', channel.id);
            channel.member_count = memberCount || 0;
            
            const { count: postCount } = await _supabase
                .from('channel_posts')
                .select('*', { count: 'exact', head: true })
                .eq('channel_id', channel.id)
                .eq('status', 'active');
            channel.post_count = postCount || 0;
        }
        
        renderChannels();
    }
    
    function renderChannels() {
        const searchTerm = searchInput.value.toLowerCase();
        let filtered = allChannels;
        
        if (currentCategory === 'my') {
            filtered = allChannels.filter(channel => followedChannelIds.has(channel.id));
        }
        
        filtered = filtered.filter(channel => 
            channel.name.toLowerCase().includes(searchTerm) ||
            (channel.description && channel.description.toLowerCase().includes(searchTerm))
        );
        
        if (filtered.length === 0) {
            if (currentCategory === 'my') {
                channelsGrid.innerHTML = '<div class="empty-state"><i class="fas fa-broadcast-tower"></i><p>You haven\'t followed any channels yet</p><p style="font-size: 0.875rem; margin-top: 0.5rem;">Discover and follow channels!</p></div>';
            } else {
                channelsGrid.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No channels found</p></div>';
            }
            return;
        }
        
        channelsGrid.innerHTML = filtered.map(channel => {
            const isFollowed = followedChannelIds.has(channel.id);
            const isOwner = channel.owner_id === currentUserId;
            const typeIcon = getChannelTypeIcon(channel.type);
            const typeLabel = getChannelTypeLabel(channel.type);
            
            return `
                <div class="channel-card" data-channel-id="${channel.id}">
                    <div class="channel-header">
                        <div class="channel-icon">${typeIcon}</div>
                        <div class="channel-info">
                            <div class="channel-name">
                                ${escapeHtml(channel.name)}
                                <span class="channel-type ${channel.type}">${typeLabel}</span>
                                ${channel.is_verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="channel-description">${escapeHtml(channel.description || 'No description')}</div>
                    <div class="channel-stats">
                        <span><i class="fas fa-users"></i> ${channel.member_count || 0} followers</span>
                        <span><i class="fas fa-newspaper"></i> ${channel.post_count || 0} posts</span>
                    </div>
                    <div class="channel-footer">
                        ${!isOwner ? `
                            <button class="follow-btn ${isFollowed ? 'following' : ''}" data-channel-id="${channel.id}" data-action="${isFollowed ? 'unfollow' : 'follow'}">
                                ${isFollowed ? '<i class="fas fa-check"></i> Following' : '<i class="fas fa-plus"></i> Follow'}
                            </button>
                        ` : `
                            <span style="font-size: 0.75rem; color: var(--primary);"><i class="fas fa-crown"></i> Owner</span>
                        `}
                        <span style="font-size: 0.7rem; color: var(--text-muted);">
                            <i class="fas fa-calendar"></i> ${new Date(channel.created_at).toLocaleDateString()}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
        
        // Add click handlers for channel cards
        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.follow-btn')) return;
                const channelId = card.dataset.channelId;
                window.location.href = `channel-view.html?id=${channelId}`;
            });
        });
        
        // Add follow/unfollow button handlers
        document.querySelectorAll('.follow-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const channelId = btn.dataset.channelId;
                const action = btn.dataset.action;
                
                if (action === 'follow') {
                    await followChannel(channelId);
                } else {
                    await unfollowChannel(channelId);
                }
            });
        });
    }
    
    async function followChannel(channelId) {
        const { error } = await _supabase
            .from('channel_members')
            .insert({ channel_id: channelId, user_id: currentUserId });
        
        if (error) {
            showToast('Failed to follow channel', 'error');
            return;
        }
        
        followedChannelIds.add(channelId);
        showToast('Following channel!', 'success');
        
        // Update member count
        await _supabase
            .from('channels')
            .update({ member_count: _supabase.sql`member_count + 1` })
            .eq('id', channelId);
        
        await loadChannels();
    }
    
    async function unfollowChannel(channelId) {
        const { error } = await _supabase
            .from('channel_members')
            .delete()
            .eq('channel_id', channelId)
            .eq('user_id', currentUserId);
        
        if (error) {
            showToast('Failed to unfollow channel', 'error');
            return;
        }
        
        followedChannelIds.delete(channelId);
        showToast('Unfollowed channel', 'success');
        
        // Update member count
        await _supabase
            .from('channels')
            .update({ member_count: _supabase.sql`member_count - 1` })
            .eq('id', channelId);
        
        await loadChannels();
    }
    
    async function createChannel() {
        const name = channelNameInput.value.trim();
        const description = channelDescriptionInput.value.trim();
        const type = channelTypeSelect.value;
        
        if (!name) {
            showToast('Please enter a channel name', 'warning');
            return;
        }
        
        const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        
        const { data, error } = await _supabase
            .from('channels')
            .insert({
                owner_id: currentUserId,
                name: name,
                slug: slug,
                description: description || null,
                type: type,
                created_at: new Date().toISOString()
            })
            .select()
            .single();
        
        if (error) {
            showToast('Failed to create channel', 'error');
            return;
        }
        
        // Add owner as member
        await _supabase
            .from('channel_members')
            .insert({ channel_id: data.id, user_id: currentUserId, role: 'admin' });
        
        followedChannelIds.add(data.id);
        showToast('Channel created successfully!', 'success');
        
        createChannelModal.classList.remove('show');
        channelNameInput.value = '';
        channelDescriptionInput.value = '';
        channelTypeSelect.value = 'page';
        
        await loadChannels();
    }
    
    // ========================================
    // EVENT LISTENERS
    // ========================================
    categoryTabs.forEach(tab => {
        tab.addEventListener('click', async () => {
            categoryTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.dataset.category;
            await loadChannels();
        });
    });
    
    searchInput.addEventListener('input', () => {
        renderChannels();
    });
    
    createChannelBtn.addEventListener('click', () => {
        createChannelModal.classList.add('show');
    });
    
    closeModal.addEventListener('click', () => {
        createChannelModal.classList.remove('show');
    });
    
    createChannelModal.addEventListener('click', (e) => {
        if (e.target === createChannelModal) {
            createChannelModal.classList.remove('show');
        }
    });
    
    submitChannelBtn.addEventListener('click', createChannel);
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    notificationIcon?.addEventListener('click', () => {
        window.location.href = 'notifications.html';
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    // ========================================
    // INITIALIZATION
    // ========================================
    async function init() {
        if (!await checkAuth()) return;
        await loadFollowedChannels();
        await loadChannels();
        await updateNotificationBadge();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
