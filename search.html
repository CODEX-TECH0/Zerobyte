<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Search - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            font-size: 1rem;
            color: var(--text-primary);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
        }
        
        .filter-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
        }
        
        .filter-tab.active {
            background: var(--primary);
            color: white;
        }
        
        /* User Card */
        .user-card {
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            transition: all 0.2s;
        }
        
        .user-card:hover {
            border-color: var(--primary-soft);
            transform: translateX(4px);
        }
        
        .user-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .user-username {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .user-bio {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .follow-btn {
            padding: 0.5rem 1.25rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .follow-btn.following {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
        }
        
        .follow-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Post Card */
        .post-card {
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .post-card:hover {
            border-color: var(--primary-soft);
        }
        
        .post-header {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .post-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .post-content {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }
        
        .post-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        /* Channel Card */
        .channel-card {
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .channel-card:hover {
            border-color: var(--primary-soft);
        }
        
        .channel-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-soft);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }
        
        .channel-info {
            flex: 1;
        }
        
        .channel-name {
            font-weight: 700;
        }
        
        .channel-description {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .badge-blue { color: #3B82F6; margin-left: 0.25rem; }
        .badge-gold { color: #F59E0B; margin-left: 0.25rem; }
        .badge-admin { color: #8B5CF6; margin-left: 0.25rem; }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<div class="container">
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search users, posts, or channels...">
    </div>
    
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="users">Users</button>
        <button class="filter-tab" data-filter="posts">Posts</button>
        <button class="filter-tab" data-filter="channels">Channels</button>
    </div>
    
    <div id="resultsContainer">
        <div class="empty-state">
            <i class="fas fa-search"></i>
            <p>Search for users, posts, or channels</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item active" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentFilter = 'users';
    let following = new Set();
    
    const searchInput = document.getElementById('searchInput');
    const filterTabs = document.querySelectorAll('.filter-tab');
    const resultsContainer = document.getElementById('resultsContainer');
    const notificationIcon = document.getElementById('notificationIcon');
    
    let searchTimeout = null;
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    function displayAvatar(container, avatarUrl, name) {
        if (!container) return;
        
        if (avatarUrl && avatarUrl.startsWith('http')) {
            container.innerHTML = `<img src="${avatarUrl}" alt="avatar" onerror="this.onerror=null; this.parentElement.innerHTML='${escapeHtml(name.charAt(0).toUpperCase())}';">`;
        } else {
            const initial = (name || 'U').charAt(0).toUpperCase();
            container.innerHTML = initial;
        }
    }
    
    async function updateNotificationBadge() {
        if (!currentUserId) return;
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        return true;
    }
    
    async function loadFollowing() {
        const { data, error } = await _supabase
            .from('followers')
            .select('following_id')
            .eq('follower_id', currentUserId);
        
        if (error) {
            console.error('Load following error:', error);
            return;
        }
        
        following.clear();
        if (data) {
            data.forEach(f => following.add(f.following_id));
        }
    }
    
    async function followUser(userId) {
        try {
            // Check if already following
            if (following.has(userId)) {
                showToast('Already following this user', 'info');
                return false;
            }
            
            const { error } = await _supabase
                .from('followers')
                .insert({ 
                    follower_id: currentUserId, 
                    following_id: userId,
                    created_at: new Date().toISOString()
                });
            
            if (error) {
                console.error('Follow error:', error);
                showToast('Failed to follow: ' + (error.message || 'Unknown error'), 'error');
                return false;
            }
            
            following.add(userId);
            showToast('Followed!', 'success');
            
            // Create notification for the user being followed
            await _supabase.from('notifications').insert({
                user_id: userId,
                type: 'follow',
                actor_id: currentUserId,
                content: `${currentUser?.display_name || 'Someone'} started following you`,
                created_at: new Date().toISOString()
            });
            
            return true;
        } catch (err) {
            console.error('Follow exception:', err);
            showToast('Failed to follow user', 'error');
            return false;
        }
    }
    
    async function unfollowUser(userId) {
        try {
            const { error } = await _supabase
                .from('followers')
                .delete()
                .eq('follower_id', currentUserId)
                .eq('following_id', userId);
            
            if (error) {
                console.error('Unfollow error:', error);
                showToast('Failed to unfollow: ' + (error.message || 'Unknown error'), 'error');
                return false;
            }
            
            following.delete(userId);
            showToast('Unfollowed', 'success');
            return true;
        } catch (err) {
            console.error('Unfollow exception:', err);
            showToast('Failed to unfollow user', 'error');
            return false;
        }
    }
    
    async function searchUsers(query) {
        if (!query || query.length < 2) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Type at least 2 characters to search</p></div>';
            return;
        }
        
        const { data, error } = await _supabase
            .from('users')
            .select('*')
            .neq('id', currentUserId)
            .or(`username.ilike.%${query}%,display_name.ilike.%${query}%`)
            .limit(20);
        
        if (error) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error searching users</p></div>';
            return;
        }
        
        if (!data || data.length === 0) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
            return;
        }
        
        // Get current user info for display
        const { data: currentUserData } = await _supabase
            .from('users')
            .select('display_name, username')
            .eq('id', currentUserId)
            .single();
        
        window.currentUser = currentUserData;
        
        resultsContainer.innerHTML = data.map(user => {
            const isFollowing = following.has(user.id);
            const displayName = user.display_name || user.username;
            const badgeIcon = getBadgeIcon(user.verification_badge);
            
            return `
                <div class="user-card" data-user-id="${user.id}">
                    <div class="user-avatar" id="user-avatar-${user.id}"></div>
                    <div class="user-info">
                        <div class="user-name">
                            ${escapeHtml(displayName)} ${badgeIcon}
                        </div>
                        <div class="user-username">@${escapeHtml(user.username)}</div>
                        <div class="user-bio">${escapeHtml(user.bio || 'No bio yet')}</div>
                    </div>
                    <button class="follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${user.id}">
                        ${isFollowing ? '<i class="fas fa-check"></i> Following' : '<i class="fas fa-plus"></i> Follow'}
                    </button>
                </div>
            `;
        }).join('');
        
        // Set avatars for each user
        for (const user of data) {
            const avatarContainer = document.getElementById(`user-avatar-${user.id}`);
            if (avatarContainer) {
                displayAvatar(avatarContainer, user.avatar_url, user.display_name || user.username);
            }
        }
        
        // Add follow button listeners
        document.querySelectorAll('.follow-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const userId = btn.dataset.userId;
                const isFollowing = btn.classList.contains('following');
                
                btn.disabled = true;
                if (isFollowing) {
                    await unfollowUser(userId);
                } else {
                    await followUser(userId);
                }
                btn.disabled = false;
                
                // Refresh search results to update button state
                await searchUsers(searchInput.value);
            });
        });
        
        // Add click to view profile
        document.querySelectorAll('.user-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.follow-btn')) return;
                const userId = card.dataset.userId;
                window.location.href = `profile.html?id=${userId}`;
            });
        });
    }
    
    async function searchPosts(query) {
        if (!query || query.length < 2) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Type at least 2 characters to search</p></div>';
            return;
        }
        
        const { data, error } = await _supabase
            .from('posts')
            .select('*, users!posts_user_id_fkey(id, username, display_name, avatar_url, verification_badge)')
            .or(`title.ilike.%${query}%,content.ilike.%${query}%`)
            .eq('status', 'active')
            .order('created_at', { ascending: false })
            .limit(30);
        
        if (error) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error searching posts</p></div>';
            return;
        }
        
        if (!data || data.length === 0) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>No posts found</p></div>';
            return;
        }
        
        resultsContainer.innerHTML = data.map(post => {
            const author = post.users;
            const displayName = author?.display_name || author?.username || 'User';
            const badgeIcon = getBadgeIcon(author?.verification_badge);
            
            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar" id="post-avatar-${post.id}"></div>
                        <div class="post-user-info">
                            <div class="post-username">
                                ${escapeHtml(displayName)} ${badgeIcon}
                                <span class="post-time">${formatTimeAgo(post.created_at)}</span>
                            </div>
                        </div>
                    </div>
                    ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                    <div class="post-content">${escapeHtml(post.content.substring(0, 200))}${post.content.length > 200 ? '...' : ''}</div>
                    <div class="post-stats">
                        <span><i class="fas fa-heart"></i> ${post.like_count || 0}</span>
                        <span><i class="fas fa-comment"></i> ${post.comment_count || 0}</span>
                    </div>
                </div>
            `;
        }).join('');
        
        // Set avatars for each post author
        for (const post of data) {
            const avatarContainer = document.getElementById(`post-avatar-${post.id}`);
            if (avatarContainer && post.users) {
                displayAvatar(avatarContainer, post.users.avatar_url, post.users.display_name || post.users.username);
            }
        }
        
        document.querySelectorAll('.post-card').forEach(card => {
            card.addEventListener('click', () => {
                window.location.href = `home.html?post=${card.dataset.postId}`;
            });
        });
    }
    
    async function searchChannels(query) {
        if (!query || query.length < 2) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Type at least 2 characters to search</p></div>';
            return;
        }
        
        const { data, error } = await _supabase
            .from('channels')
            .select('*')
            .or(`name.ilike.%${query}%,description.ilike.%${query}%`)
            .eq('status', 'active')
            .limit(20);
        
        if (error) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error searching channels</p></div>';
            return;
        }
        
        if (!data || data.length === 0) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-broadcast-tower"></i><p>No channels found</p></div>';
            return;
        }
        
        const icons = { page: 'fa-newspaper', broadcast: 'fa-bullhorn', feed: 'fa-rss' };
        
        resultsContainer.innerHTML = data.map(channel => {
            const icon = icons[channel.type] || 'fa-hashtag';
            return `
                <div class="channel-card" data-channel-id="${channel.id}">
                    <div class="channel-icon"><i class="fas ${icon}"></i></div>
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}</div>
                        <div class="channel-description">${escapeHtml(channel.description || 'No description')}</div>
                        <div class="channel-stats" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem;">
                            <span><i class="fas fa-users"></i> ${channel.member_count || 0} members</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('click', () => {
                window.location.href = `channel-view.html?id=${card.dataset.channelId}`;
            });
        });
    }
    
    async function performSearch() {
        const query = searchInput.value.trim();
        
        if (currentFilter === 'users') {
            await searchUsers(query);
        } else if (currentFilter === 'posts') {
            await searchPosts(query);
        } else if (currentFilter === 'channels') {
            await searchChannels(query);
        }
    }
    
    // Debounced search
    searchInput.addEventListener('input', () => {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performSearch, 500);
    });
    
    // Filter tabs
    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            filterTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            performSearch();
        });
    });
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    notificationIcon?.addEventListener('click', () => {
        window.location.href = 'notifications.html';
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    async function init() {
        if (!await checkAuth()) return;
        await loadFollowing();
        await updateNotificationBadge();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
