<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Story - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --primary-soft: rgba(139, 92, 246, 0.15);
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
            --primary: #7C3AED;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: var(--bg-glass-hover);
            color: var(--primary);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .story-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 2rem;
            text-align: center;
        }
        
        .story-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .story-preview {
            width: 100%;
            height: 400px;
            background: var(--bg-glass);
            border-radius: var(--radius-2xl);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-glass);
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }
        
        .story-preview:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }
        
        .story-preview img, .story-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-placeholder {
            text-align: center;
            color: var(--text-muted);
        }
        
        .preview-placeholder i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .upload-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .upload-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .upload-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .caption-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            color: var(--text-primary);
            font-family: inherit;
            margin-bottom: 1.5rem;
            resize: none;
        }
        
        .caption-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        
        .post-story-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .post-story-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        
        .post-story-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 1rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            background: none;
            border: none;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.7rem; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (min-width: 768px) {
            .bottom-nav { display: none; }
        }
        
        @media (max-width: 768px) {
            .navbar .back-btn { display: none; }
            .story-preview { height: 300px; }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="navbar">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="logo" id="logo"><i class="fas fa-bolt"></i> ZERØBYTE</div>
    <div style="width: 40px;"></div>
</div>

<div class="container">
    <div class="story-card">
        <div class="story-title">
            <i class="fas fa-plus-circle"></i> Create Story
        </div>
        
        <div class="story-preview" id="storyPreview">
            <div class="preview-placeholder">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Tap to add image or video</p>
                <p style="font-size: 0.75rem; margin-top: 0.5rem;">Stories disappear after 24 hours</p>
            </div>
        </div>
        
        <div class="upload-buttons">
            <button class="upload-btn" id="uploadImageBtn">
                <i class="fas fa-image"></i> Image
            </button>
            <button class="upload-btn" id="uploadVideoBtn">
                <i class="fas fa-video"></i> Video
            </button>
        </div>
        
        <input type="file" id="mediaInput" style="display: none;" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime">
        
        <textarea id="storyCaption" class="caption-input" placeholder="Add a caption... (optional)" rows="3"></textarea>
        
        <button class="post-story-btn" id="postStoryBtn" disabled>
            <i class="fas fa-paper-plane"></i> Share to Story
        </button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></button>
    <button class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></button>
    <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let selectedFile = null;
    let mediaType = null;
    
    const storyPreview = document.getElementById('storyPreview');
    const mediaInput = document.getElementById('mediaInput');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const uploadVideoBtn = document.getElementById('uploadVideoBtn');
    const storyCaption = document.getElementById('storyCaption');
    const postStoryBtn = document.getElementById('postStoryBtn');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        return true;
    }
    
    function displayPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if (mediaType === 'image') {
                storyPreview.innerHTML = `<img src="${e.target.result}" alt="preview">`;
            } else if (mediaType === 'video') {
                storyPreview.innerHTML = `<video src="${e.target.result}" controls style="width:100%;height:100%;object-fit:cover;"></video>`;
            }
        };
        reader.readAsDataURL(file);
        postStoryBtn.disabled = false;
    }
    
    uploadImageBtn.addEventListener('click', () => {
        mediaType = 'image';
        mediaInput.accept = 'image/jpeg,image/png,image/webp,image/gif';
        mediaInput.click();
    });
    
    uploadVideoBtn.addEventListener('click', () => {
        mediaType = 'video';
        mediaInput.accept = 'video/mp4,video/quicktime';
        mediaInput.click();
    });
    
    mediaInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            if (mediaType === 'image' && !file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            if (mediaType === 'video' && !file.type.startsWith('video/')) {
                showToast('Please select a video file', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('File must be less than 10MB', 'error');
                return;
            }
            selectedFile = file;
            displayPreview(file);
        }
    });
    
    async function uploadStory() {
        if (!selectedFile) {
            showToast('Please select an image or video', 'warning');
            return;
        }
        
        postStoryBtn.disabled = true;
        postStoryBtn.innerHTML = '<div class="spinner"></div> Uploading...';
        
        try {
            // Upload to storage
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `story_${currentUserId}_${Date.now()}.${fileExt}`;
            
            const { error: uploadError } = await _supabase.storage
                .from('post-images')
                .upload(fileName, selectedFile);
            
            if (uploadError) {
                console.error('Upload error:', uploadError);
                showToast('Upload failed: ' + uploadError.message, 'error');
                postStoryBtn.disabled = false;
                postStoryBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Share to Story';
                return;
            }
            
            // Get public URL
            const { data: { publicUrl } } = _supabase.storage
                .from('post-images')
                .getPublicUrl(fileName);
            
            // Calculate expiry (24 hours from now)
            const expiresAt = new Date();
            expiresAt.setHours(expiresAt.getHours() + 24);
            
            // Insert into stories table
            const { error: insertError } = await _supabase
                .from('stories')
                .insert({
                    user_id: currentUserId,
                    media_url: publicUrl,
                    media_type: mediaType,
                    caption: storyCaption.value.trim() || null,
                    created_at: new Date().toISOString(),
                    expires_at: expiresAt.toISOString()
                });
            
            if (insertError) {
                console.error('Insert error:', insertError);
                showToast('Database error: ' + insertError.message, 'error');
                postStoryBtn.disabled = false;
                postStoryBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Share to Story';
                return;
            }
            
            showToast('Story posted! It will disappear after 24 hours.', 'success');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
            
        } catch (err) {
            console.error('Exception:', err);
            showToast('An error occurred. Please try again.', 'error');
            postStoryBtn.disabled = false;
            postStoryBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Share to Story';
        }
    }
    
    postStoryBtn.addEventListener('click', uploadStory);
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('backBtn')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    async function init() {
        if (!await checkAuth()) return;
    }
    
    init();
})();
</script>
</body>
</html>
