<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Chat - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            flex-shrink: 0;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .back-btn:hover {
            color: var(--primary);
        }
        
        .chat-user-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }
        
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-name-section {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .chat-status {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            align-self: flex-end;
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-2xl);
            word-break: break-word;
        }
        
        .message.sent .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        
        .message.received .message-bubble {
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-bottom-left-radius: 0.25rem;
        }
        
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            margin-top: 0.25rem;
        }
        
        .message-time {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.25rem;
            text-align: right;
        }
        
        .message.received .message-time {
            color: var(--text-muted);
        }
        
        .read-receipt {
            font-size: 0.6rem;
            margin-left: 0.5rem;
        }
        
        .date-separator {
            text-align: center;
            margin: 1rem 0;
        }
        
        .date-separator span {
            background: var(--bg-glass-solid);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-xl);
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            background: var(--bg-glass-solid);
            border-radius: var(--radius-xl);
            width: fit-content;
            margin-bottom: 0.5rem;
            margin-left: 1rem;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        
        .input-area {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-shrink: 0;
        }
        
        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        
        .attach-btn:hover {
            color: var(--primary);
        }
        
        .message-input {
            flex: 1;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .message-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .image-modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: var(--radius-2xl);
        }
        
        .empty-chat {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .badge-blue { color: #3B82F6; margin-left: 0.25rem; }
        .badge-gold { color: #F59E0B; margin-left: 0.25rem; }
        .badge-admin { color: #8B5CF6; margin-left: 0.25rem; }
        
        .linkified {
            color: inherit;
            text-decoration: underline;
        }
        
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: var(--border-glass);
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: var(--primary-soft);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="navbar">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="chat-user-info" id="userInfoBtn">
        <div class="chat-avatar" id="chatAvatar">
            <span id="avatarText">?</span>
        </div>
        <div class="chat-name-section">
            <div class="chat-name" id="chatName">Loading...</div>
            <div class="chat-status" id="chatStatus">Online</div>
        </div>
    </div>
</div>

<div class="messages-container" id="messagesContainer">
    <div class="empty-chat">
        <i class="fas fa-comment-dots" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
        <p>No messages yet</p>
        <p style="font-size: 0.875rem; margin-top: 0.5rem;">Send a message to start the conversation</p>
    </div>
</div>

<div id="typingIndicator" style="display: none;">
    <div class="typing-indicator">
        <span></span><span></span><span></span>
        <span style="margin-left: 0.5rem; font-size: 0.7rem;">typing...</span>
    </div>
</div>

<div class="input-area">
    <button class="attach-btn" id="attachBtn"><i class="fas fa-image"></i></button>
    <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</div>

<div class="image-modal" id="imageModal">
    <img id="modalImage" src="">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentUser = null;
    let otherUserId = null;
    let otherUser = null;
    let messages = [];
    let isLoading = false;
    let hasMore = true;
    let typingTimeout = null;
    let isTyping = false;
    
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const chatName = document.getElementById('chatName');
    const chatStatus = document.getElementById('chatStatus');
    const chatAvatar = document.getElementById('chatAvatar');
    const avatarText = document.getElementById('avatarText');
    const userInfoBtn = document.getElementById('userInfoBtn');
    const attachBtn = document.getElementById('attachBtn');
    const imageModal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const typingIndicatorDiv = document.getElementById('typingIndicator');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function linkify(text) {
        if (!text) return '';
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="linkified">${url}</a>`;
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime(date) {
        return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function formatDate(date) {
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        const msgDate = new Date(date);
        
        if (msgDate.toDateString() === today.toDateString()) return 'Today';
        if (msgDate.toDateString() === yesterday.toDateString()) return 'Yesterday';
        return msgDate.toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    function getOtherUserId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('user');
    }
    
    async function loadOtherUser() {
        otherUserId = getOtherUserId();
        if (!otherUserId) {
            showToast('No user specified', 'error');
            setTimeout(() => window.location.href = 'chats.html', 1500);
            return false;
        }
        
        const { data, error } = await _supabase
            .from('users')
            .select('*')
            .eq('id', otherUserId)
            .single();
        
        if (error) {
            showToast('User not found', 'error');
            setTimeout(() => window.location.href = 'chats.html', 1500);
            return false;
        }
        
        otherUser = data;
        const displayName = data.display_name || data.username;
        const avatarInitial = displayName.charAt(0).toUpperCase();
        const badgeIcon = getBadgeIcon(data.verification_badge);
        
        chatName.innerHTML = `${escapeHtml(displayName)} ${badgeIcon}`;
        
        if (data.avatar_url) {
            avatarText.innerHTML = `<img src="${data.avatar_url}" style="width: 100%; height: 100%; object-fit: cover;">`;
        } else {
            avatarText.textContent = avatarInitial;
        }
        
        return true;
    }
    
    async function loadMessages(loadMore = false) {
        if (isLoading) return;
        isLoading = true;
        
        let query = _supabase
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${currentUserId})`)
            .order('created_at', { ascending: false })
            .limit(50);
        
        if (loadMore && messages.length > 0) {
            const oldestDate = messages[0]?.created_at;
            if (oldestDate) {
                query = query.lt('created_at', oldestDate);
            }
        }
        
        const { data, error } = await query;
        
        if (error) {
            isLoading = false;
            return;
        }
        
        const newMessages = data.reverse();
        
        if (loadMore) {
            messages = [...newMessages, ...messages];
        } else {
            messages = newMessages;
        }
        
        hasMore = data.length === 50;
        isLoading = false;
        
        renderMessages();
        
        if (!loadMore) {
            scrollToBottom();
            markMessagesAsRead();
        }
    }
    
    function renderMessages() {
        if (messages.length === 0) {
            messagesContainer.innerHTML = `
                <div class="empty-chat">
                    <i class="fas fa-comment-dots" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
                    <p>No messages yet</p>
                    <p style="font-size: 0.875rem; margin-top: 0.5rem;">Send a message to start the conversation</p>
                </div>
            `;
            return;
        }
        
        let lastDate = null;
        let html = '';
        
        for (const msg of messages) {
            const msgDate = formatDate(msg.created_at);
            if (msgDate !== lastDate) {
                html += `<div class="date-separator"><span>${msgDate}</span></div>`;
                lastDate = msgDate;
            }
            
            const isSent = msg.sender_id === currentUserId;
            const time = formatTime(msg.created_at);
            const readReceipt = isSent && msg.is_read ? '✓✓' : (isSent ? '✓' : '');
            
            html += `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="message-bubble">
                        <div>${linkify(escapeHtml(msg.content))}</div>
                        ${msg.image_url ? `<img src="${msg.image_url}" class="message-image" onclick="openImageModal('${msg.image_url}')">` : ''}
                        <div class="message-time">
                            ${time} ${readReceipt ? `<span class="read-receipt">${readReceipt}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        messagesContainer.innerHTML = html;
        
        document.querySelectorAll('.message-image').forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                modalImage.src = img.src;
                imageModal.classList.add('show');
            });
        });
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    async function markMessagesAsRead() {
        const unreadMessages = messages.filter(
            msg => msg.receiver_id === currentUserId && !msg.is_read
        );
        
        for (const msg of unreadMessages) {
            await _supabase
                .from('messages')
                .update({ is_read: true, read_at: new Date().toISOString() })
                .eq('id', msg.id);
        }
        
        if (unreadMessages.length > 0) {
            messages = messages.map(msg => 
                unreadMessages.find(um => um.id === msg.id) 
                    ? { ...msg, is_read: true } 
                    : msg
            );
            renderMessages();
        }
    }
    
    async function sendMessage() {
        const content = messageInput.value.trim();
        if (!content) return;
        
        const tempId = 'temp_' + Date.now();
        const tempMessage = {
            id: tempId,
            sender_id: currentUserId,
            receiver_id: otherUserId,
            content: content,
            created_at: new Date().toISOString(),
            is_read: false
        };
        
        messages.push(tempMessage);
        renderMessages();
        scrollToBottom();
        
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        const { error } = await _supabase
            .from('messages')
            .insert({
                sender_id: currentUserId,
                receiver_id: otherUserId,
                content: content,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            showToast('Failed to send message', 'error');
            messages = messages.filter(m => m.id !== tempId);
            renderMessages();
        }
        
        // Create notification for receiver
        if (otherUserId) {
            await _supabase.from('notifications').insert({
                user_id: otherUserId,
                type: 'message',
                actor_id: currentUserId,
                target_id: otherUserId,
                target_type: 'user',
                content: `${currentUser?.display_name || 'Someone'} sent you a message`,
                created_at: new Date().toISOString()
            });
        }
    }
    
    async function uploadImage(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `chat_${currentUserId}_${Date.now()}.${fileExt}`;
        
        const { error: uploadError } = await _supabase.storage
            .from('chat-images')
            .upload(fileName, file);
        
        if (uploadError) {
            showToast('Upload failed', 'error');
            return null;
        }
        
        const { data: { publicUrl } } = _supabase.storage
            .from('chat-images')
            .getPublicUrl(fileName);
        
        return publicUrl;
    }
    
    async function sendImage(file) {
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            showToast('Please select an image file', 'error');
            return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
            showToast('Image must be less than 5MB', 'error');
            return;
        }
        
        const imageUrl = await uploadImage(file);
        if (!imageUrl) return;
        
        const { error } = await _supabase
            .from('messages')
            .insert({
                sender_id: currentUserId,
                receiver_id: otherUserId,
                content: '📷 Image',
                image_url: imageUrl,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            showToast('Failed to send image', 'error');
        } else {
            await loadMessages();
            scrollToBottom();
        }
    }
    
    function sendTypingIndicator() {
        if (!isTyping) {
            isTyping = true;
            _supabase.channel(`typing_${otherUserId}`).send({
                type: 'broadcast',
                event: 'typing',
                payload: { user_id: currentUserId, is_typing: true }
            });
        }
        
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
            _supabase.channel(`typing_${otherUserId}`).send({
                type: 'broadcast',
                event: 'typing',
                payload: { user_id: currentUserId, is_typing: false }
            });
        }, 1000);
    }
    
    messageInput.addEventListener('input', () => {
        sendTypingIndicator();
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
    });
    
    function subscribeToTyping() {
        const channel = _supabase.channel(`typing_${currentUserId}`);
        channel.on('broadcast', { event: 'typing' }, (payload) => {
            if (payload.payload.user_id === otherUserId) {
                if (payload.payload.is_typing) {
                    typingIndicatorDiv.style.display = 'block';
                    setTimeout(() => {
                        typingIndicatorDiv.style.display = 'none';
                    }, 2000);
                }
            }
        }).subscribe();
    }
    
    function subscribeToMessages() {
        _supabase
            .channel('messages_changes')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages',
                filter: `receiver_id=eq.${currentUserId}`
            }, (payload) => {
                if (payload.new.sender_id === otherUserId) {
                    loadMessages();
                    scrollToBottom();
                }
            })
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'messages',
                filter: `receiver_id=eq.${currentUserId}`
            }, () => {
                loadMessages();
            })
            .subscribe();
    }
    
    messagesContainer.addEventListener('scroll', () => {
        if (messagesContainer.scrollTop < 100 && hasMore && !isLoading) {
            loadMessages(true);
        }
    });
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    backBtn.addEventListener('click', () => {
        window.location.href = 'chats.html';
    });
    
    userInfoBtn.addEventListener('click', () => {
        window.location.href = `profile.html?id=${otherUserId}`;
    });
    
    attachBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) sendImage(file);
        };
        input.click();
    });
    
    imageModal.addEventListener('click', () => {
        imageModal.classList.remove('show');
    });
    
    window.openImageModal = function(url) {
        modalImage.src = url;
        imageModal.classList.add('show');
    };
    
    async function init() {
        if (!await checkAuth()) return;
        if (!await loadOtherUser()) return;
        await loadMessages();
        subscribeToMessages();
        subscribeToTyping();
    }
    
    init();
})();
</script>
</body>
</html>
