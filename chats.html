<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Chats - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .chats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .chats-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .new-chat-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .new-chat-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        
        .chat-item {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .chat-item:hover {
            border-color: var(--primary-soft);
            transform: translateX(4px);
        }
        
        .chat-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
        
        .chat-last-message {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }
        
        .unread-badge {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .modal-search {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .user-list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .user-list-item:hover {
            background: var(--bg-glass);
        }
        
        .user-list-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            overflow: hidden;
        }
        
        .user-list-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-list-info {
            flex: 1;
        }
        
        .user-list-name {
            font-weight: 600;
        }
        
        .user-list-username {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .badge-blue {
            color: #3B82F6;
            margin-left: 0.25rem;
        }
        
        .badge-gold {
            color: #F59E0B;
            margin-left: 0.25rem;
        }
        
        .badge-admin {
            color: #8B5CF6;
            margin-left: 0.25rem;
        }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<div class="container">
    <div class="chats-header">
        <div class="chats-title">
            <i class="fas fa-comment-dots"></i> Messages
        </div>
        <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i>
        </button>
    </div>
    
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search chats...">
    </div>
    
    <div id="chatsList">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading chats...</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" data-page="home">
        <i class="fas fa-house"></i>
        <span>Home</span>
    </div>
    <div class="nav-item" data-page="search">
        <i class="fas fa-search"></i>
        <span>Search</span>
    </div>
    <div class="nav-item" data-page="groups">
        <i class="fas fa-users"></i>
        <span>Groups</span>
    </div>
    <div class="nav-item" data-page="channels">
        <i class="fas fa-broadcast-tower"></i>
        <span>Channels</span>
    </div>
    <div class="nav-item active" data-page="chats">
        <i class="fas fa-message"></i>
        <span>Chats</span>
    </div>
    <div class="nav-item" data-page="profile">
        <i class="fas fa-user"></i>
        <span>Profile</span>
    </div>
</div>

<!-- New Chat Modal -->
<div class="modal" id="newChatModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> New Message</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <input type="text" id="userSearch" class="modal-search" placeholder="Search users...">
        <div id="userSearchResults"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentUser = null;
    let chats = [];
    let usersMap = {};
    let searchTimeout = null;
    
    const chatsList = document.getElementById('chatsList');
    const searchInput = document.getElementById('searchInput');
    const newChatBtn = document.getElementById('newChatBtn');
    const newChatModal = document.getElementById('newChatModal');
    const closeModal = document.getElementById('closeModal');
    const userSearch = document.getElementById('userSearch');
    const userSearchResults = document.getElementById('userSearchResults');
    const notificationIcon = document.getElementById('notificationIcon');
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        if (!date) return '';
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    async function updateNotificationBadge() {
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    async function fetchUserInfo(userId) {
        if (usersMap[userId]) return usersMap[userId];
        
        const { data } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .eq('id', userId)
            .single();
        
        if (data) {
            usersMap[userId] = data;
        }
        return data;
    }
    
    async function loadChats() {
        // Get all conversations where user is sender or receiver
        const { data: sent } = await _supabase
            .from('messages')
            .select('receiver_id')
            .eq('sender_id', currentUserId)
            .order('created_at', { ascending: false });
        
        const { data: received } = await _supabase
            .from('messages')
            .select('sender_id')
            .eq('receiver_id', currentUserId)
            .order('created_at', { ascending: false });
        
        // Collect unique user IDs
        const userIds = new Set();
        (sent || []).forEach(m => userIds.add(m.receiver_id));
        (received || []).forEach(m => userIds.add(m.sender_id));
        
        if (userIds.size === 0) {
            chatsList.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p><p style="font-size: 0.875rem; margin-top: 0.5rem;">Start a conversation by clicking the + button</p></div>';
            return;
        }
        
        // Fetch user info for each chat
        const chatUsers = [];
        for (const id of userIds) {
            const user = await fetchUserInfo(id);
            if (user) chatUsers.push(user);
        }
        
        // Get last message for each conversation
        const chatsData = [];
        for (const user of chatUsers) {
            const { data: lastMessage } = await _supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${user.id}),and(sender_id.eq.${user.id},receiver_id.eq.${currentUserId})`)
                .order('created_at', { ascending: false })
                .limit(1);
            
            // Count unread messages
            const { count: unreadCount } = await _supabase
                .from('messages')
                .select('*', { count: 'exact', head: true })
                .eq('sender_id', user.id)
                .eq('receiver_id', currentUserId)
                .eq('is_read', false);
            
            chatsData.push({
                user: user,
                lastMessage: lastMessage?.[0] || null,
                unreadCount: unreadCount || 0
            });
        }
        
        // Sort by last message time
        chatsData.sort((a, b) => {
            const timeA = a.lastMessage ? new Date(a.lastMessage.created_at) : new Date(0);
            const timeB = b.lastMessage ? new Date(b.lastMessage.created_at) : new Date(0);
            return timeB - timeA;
        });
        
        renderChats(chatsData);
    }
    
    function renderChats(chatsData) {
        const searchTerm = searchInput.value.toLowerCase();
        const filtered = chatsData.filter(chat => 
            chat.user.display_name?.toLowerCase().includes(searchTerm) ||
            chat.user.username?.toLowerCase().includes(searchTerm)
        );
        
        if (filtered.length === 0) {
            chatsList.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No chats found</p></div>';
            return;
        }
        
        chatsList.innerHTML = filtered.map(chat => {
            const user = chat.user;
            const displayName = user.display_name || user.username;
            const avatarInitial = displayName.charAt(0).toUpperCase();
            const badgeIcon = getBadgeIcon(user.verification_badge);
            const lastMessageText = chat.lastMessage ? 
                (chat.lastMessage.sender_id === currentUserId ? `You: ` : '') + 
                (chat.lastMessage.content?.substring(0, 50) || '') + 
                (chat.lastMessage.content?.length > 50 ? '...' : '') : 
                'No messages yet';
            const timeAgo = chat.lastMessage ? formatTimeAgo(chat.lastMessage.created_at) : '';
            
            return `
                <div class="chat-item" data-user-id="${user.id}">
                    <div class="chat-avatar">
                        ${user.avatar_url ? `<img src="${user.avatar_url}">` : avatarInitial}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(displayName)} ${badgeIcon}
                        </div>
                        <div class="chat-last-message">${escapeHtml(lastMessageText)}</div>
                    </div>
                    <div class="chat-time">${timeAgo}</div>
                    ${chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount > 9 ? '9+' : chat.unreadCount}</div>` : ''}
                </div>
            `;
        }).join('');
        
        // Add click handlers
        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', () => {
                const userId = item.dataset.userId;
                window.location.href = `chat.html?user=${userId}`;
            });
        });
    }
    
    // Search functionality
    searchInput.addEventListener('input', () => {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadChats(), 300);
    });
    
    // New Chat Modal
    newChatBtn.addEventListener('click', () => {
        newChatModal.classList.add('show');
        userSearch.value = '';
        userSearchResults.innerHTML = '';
    });
    
    closeModal.addEventListener('click', () => {
        newChatModal.classList.remove('show');
    });
    
    newChatModal.addEventListener('click', (e) => {
        if (e.target === newChatModal) {
            newChatModal.classList.remove('show');
        }
    });
    
    // Search users for new chat
    userSearch.addEventListener('input', async () => {
        const query = userSearch.value.trim();
        
        if (query.length < 2) {
            userSearchResults.innerHTML = '';
            return;
        }
        
        const { data, error } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .neq('id', currentUserId)
            .or(`username.ilike.%${query}%,display_name.ilike.%${query}%`)
            .limit(20);
        
        if (error || !data || data.length === 0) {
            userSearchResults.innerHTML = '<div style="text-align: center; padding: 1rem; color: var(--text-muted);">No users found</div>';
            return;
        }
        
        userSearchResults.innerHTML = data.map(user => {
            const displayName = user.display_name || user.username;
            const avatarInitial = displayName.charAt(0).toUpperCase();
            const badgeIcon = getBadgeIcon(user.verification_badge);
            
            return `
                <div class="user-list-item" data-user-id="${user.id}">
                    <div class="user-list-avatar">
                        ${user.avatar_url ? `<img src="${user.avatar_url}">` : avatarInitial}
                    </div>
                    <div class="user-list-info">
                        <div class="user-list-name">${escapeHtml(displayName)} ${badgeIcon}</div>
                        <div class="user-list-username">@${escapeHtml(user.username)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.user-list-item').forEach(item => {
            item.addEventListener('click', () => {
                const userId = item.dataset.userId;
                newChatModal.classList.remove('show');
                window.location.href = `chat.html?user=${userId}`;
            });
        });
    });
    
    // Real-time subscription for new messages
    function subscribeToMessages() {
        _supabase
            .channel('messages_changes')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages',
                filter: `receiver_id=eq.${currentUserId}`
            }, () => {
                loadChats();
                updateNotificationBadge();
            })
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'messages',
                filter: `receiver_id=eq.${currentUserId}`
            }, () => {
                loadChats();
                updateNotificationBadge();
            })
            .subscribe();
    }
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    notificationIcon?.addEventListener('click', () => {
        window.location.href = 'notifications.html';
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    async function init() {
        if (!await checkAuth()) return;
        await loadChats();
        await updateNotificationBadge();
        subscribeToMessages();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
