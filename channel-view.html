<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Channel - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --info: #8B5CF6;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
            --primary: #2563EB;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        /* Channel Header */
        .channel-header {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .channel-banner {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: var(--radius-xl);
            margin-bottom: -40px;
        }
        
        .channel-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin: -40px auto 1rem;
            border: 3px solid var(--bg-glass-solid);
        }
        
        .channel-name {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        
        .channel-type {
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-xl);
            background: var(--primary-soft);
            color: var(--primary);
        }
        
        .channel-type.broadcast {
            background: rgba(139, 92, 246, 0.15);
            color: var(--info);
        }
        
        .channel-type.feed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        
        .channel-description {
            color: var(--text-secondary);
            margin: 1rem 0;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .channel-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0;
        }
        
        .stat-number {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .follow-btn {
            padding: 0.625rem 2rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        
        .follow-btn.following {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
        }
        
        .follow-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Create Post Card */
        .create-post-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        
        .create-post-card.show {
            display: block;
        }
        
        .create-post-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        
        .post-input {
            flex: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.875rem 1rem;
            color: var(--text-primary);
        }
        
        /* Channel Post */
        .channel-post {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        
        .channel-post:hover {
            border-color: var(--primary-soft);
        }
        
        .post-header {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        
        .post-user-info {
            flex: 1;
        }
        
        .post-username {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .post-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: normal;
        }
        
        .post-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .post-content {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            word-break: break-word;
            line-height: 1.5;
        }
        
        .post-stats {
            display: flex;
            gap: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 0.5rem;
        }
        
        .post-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .interaction-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }
        
        .interaction-btn:hover {
            background: var(--bg-glass);
        }
        
        .interaction-btn.liked {
            color: var(--error);
        }
        
        .delete-post {
            color: var(--error);
            cursor: pointer;
            margin-left: auto;
        }
        
        .linkified {
            color: var(--primary);
            text-decoration: none;
        }
        
        .linkified:hover {
            text-decoration: underline;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .modal-input,
        .modal-textarea {
            width: 100%;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 0.75rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-family: inherit;
        }
        
        .modal-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .modal-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .badge-blue {
            color: #3B82F6;
            margin-left: 0.25rem;
        }
        
        .badge-gold {
            color: #F59E0B;
            margin-left: 0.25rem;
        }
        
        .badge-admin {
            color: #8B5CF6;
            margin-left: 0.25rem;
        }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<!-- Main Container -->
<div class="container">
    <!-- Channel Header -->
    <div class="channel-header" id="channelHeader">
        <div class="channel-banner"></div>
        <div class="channel-avatar" id="channelAvatar">
            <i class="fas fa-hashtag"></i>
        </div>
        <div class="channel-name" id="channelName">Loading...</div>
        <div class="channel-type" id="channelType">Loading</div>
        <div class="channel-description" id="channelDescription">Loading...</div>
        <div class="channel-stats">
            <div class="stat-item">
                <div class="stat-number" id="memberCount">0</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="postCount">0</div>
                <div class="stat-label">Posts</div>
            </div>
        </div>
        <button class="follow-btn" id="followBtn">Follow</button>
    </div>
    
    <!-- Create Post Card (for Page channels) -->
    <div class="create-post-card" id="createPostCard">
        <div class="create-post-header">
            <div class="avatar" id="userAvatar">?</div>
            <div class="post-input" id="openCreatePostModal">Post to channel...</div>
        </div>
    </div>
    
    <!-- Posts Container -->
    <div id="postsContainer">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading posts...</p>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item active" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<!-- Create Post Modal -->
<div class="modal" id="createPostModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> Post to Channel</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <input type="text" id="postTitle" class="modal-input" placeholder="Title (optional)">
        <textarea id="postContent" class="modal-textarea" placeholder="What's on your mind?"></textarea>
        <button class="modal-btn" id="submitPostBtn">Post</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========================================
// ZERØBYTE - CHANNEL VIEW PAGE
// ========================================

(function() {
    // Supabase Configuration
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========================================
    // VARIABLES
    // ========================================
    let currentUserId = null;
    let currentUser = null;
    let channelId = null;
    let channel = null;
    let channelPosts = [];
    let isFollowing = false;
    let isOwner = false;
    let canPost = false;
    let likedPosts = new Set();
    
    // DOM Elements
    const postsContainer = document.getElementById('postsContainer');
    const channelName = document.getElementById('channelName');
    const channelType = document.getElementById('channelType');
    const channelDescription = document.getElementById('channelDescription');
    const channelAvatar = document.getElementById('channelAvatar');
    const memberCountSpan = document.getElementById('memberCount');
    const postCountSpan = document.getElementById('postCount');
    const followBtn = document.getElementById('followBtn');
    const createPostCard = document.getElementById('createPostCard');
    const userAvatar = document.getElementById('userAvatar');
    const createPostModal = document.getElementById('createPostModal');
    const postTitle = document.getElementById('postTitle');
    const postContent = document.getElementById('postContent');
    const submitPostBtn = document.getElementById('submitPostBtn');
    const notificationIcon = document.getElementById('notificationIcon');
    
    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : 
                     type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function linkify(text) {
        if (!text) return '';
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="linkified">${url}</a>`;
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(date).toLocaleDateString();
    }
    
    function getChannelTypeLabel(type) {
        switch(type) {
            case 'page': return '📰 Page Channel';
            case 'broadcast': return '📢 Broadcast Channel';
            case 'feed': return '📡 Feed Channel';
            default: return type;
        }
    }
    
    function getBadgeIcon(badge) {
        if (badge === 'admin') return '<i class="fas fa-shield-alt badge-admin"></i>';
        if (badge === 'gold') return '<i class="fas fa-crown badge-gold"></i>';
        if (badge === 'blue') return '<i class="fas fa-check-circle badge-blue"></i>';
        return '';
    }
    
    async function updateNotificationBadge() {
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    // ========================================
    // AUTHENTICATION
    // ========================================
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        
        const initial = (currentUser?.display_name || currentUser?.username || 'U').charAt(0).toUpperCase();
        userAvatar.textContent = initial;
        
        return true;
    }
    
    function getChannelId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }
    
    // ========================================
    // CHANNEL FUNCTIONS
    // ========================================
    async function loadChannel() {
        channelId = getChannelId();
        if (!channelId) {
            showToast('No channel specified', 'error');
            setTimeout(() => window.location.href = 'channels.html', 1500);
            return false;
        }
        
        const { data, error } = await _supabase
            .from('channels')
            .select('*')
            .eq('id', channelId)
            .single();
        
        if (error) {
            showToast('Channel not found', 'error');
            setTimeout(() => window.location.href = 'channels.html', 1500);
            return false;
        }
        
        channel = data;
        isOwner = channel.owner_id === currentUserId;
        
        channelName.innerHTML = `<i class="fas fa-hashtag"></i> ${escapeHtml(channel.name)}`;
        channelType.textContent = getChannelTypeLabel(channel.type);
        channelType.className = `channel-type ${channel.type}`;
        channelDescription.textContent = channel.description || 'No description';
        
        // Set channel avatar icon
        const icons = { page: 'fa-newspaper', broadcast: 'fa-bullhorn', feed: 'fa-rss' };
        channelAvatar.innerHTML = `<i class="fas ${icons[channel.type] || 'fa-hashtag'}"></i>`;
        
        // Check if user can post (Page channels allow members, Broadcast only owner)
        canPost = (channel.type === 'page') || isOwner;
        
        if (canPost) {
            createPostCard.classList.add('show');
        }
        
        return true;
    }
    
    async function checkFollowStatus() {
        const { data, error } = await _supabase
            .from('channel_members')
            .select('id')
            .eq('channel_id', channelId)
            .eq('user_id', currentUserId)
            .maybeSingle();
        
        isFollowing = !!data;
        
        if (isFollowing) {
            followBtn.textContent = 'Following';
            followBtn.classList.add('following');
        } else {
            followBtn.textContent = 'Follow';
            followBtn.classList.remove('following');
        }
    }
    
    async function toggleFollow() {
        if (isFollowing) {
            const { error } = await _supabase
                .from('channel_members')
                .delete()
                .eq('channel_id', channelId)
                .eq('user_id', currentUserId);
            
            if (error) {
                showToast('Failed to unfollow', 'error');
                return;
            }
            
            isFollowing = false;
            followBtn.textContent = 'Follow';
            followBtn.classList.remove('following');
            showToast('Unfollowed channel', 'success');
            
            await _supabase
                .from('channels')
                .update({ member_count: _supabase.sql`member_count - 1` })
                .eq('id', channelId);
        } else {
            const { error } = await _supabase
                .from('channel_members')
                .insert({ channel_id: channelId, user_id: currentUserId });
            
            if (error) {
                showToast('Failed to follow', 'error');
                return;
            }
            
            isFollowing = true;
            followBtn.textContent = 'Following';
            followBtn.classList.add('following');
            showToast('Following channel!', 'success');
            
            await _supabase
                .from('channels')
                .update({ member_count: _supabase.sql`member_count + 1` })
                .eq('id', channelId);
        }
        
        await loadStats();
    }
    
    async function loadStats() {
        const { count: memberCount } = await _supabase
            .from('channel_members')
            .select('*', { count: 'exact', head: true })
            .eq('channel_id', channelId);
        
        const { count: postCount } = await _supabase
            .from('channel_posts')
            .select('*', { count: 'exact', head: true })
            .eq('channel_id', channelId)
            .eq('status', 'active');
        
        memberCountSpan.textContent = memberCount || 0;
        postCountSpan.textContent = postCount || 0;
    }
    
    async function loadChannelPosts() {
        const { data, error } = await _supabase
            .from('channel_posts')
            .select('*')
            .eq('channel_id', channelId)
            .eq('status', 'active')
            .order('created_at', { ascending: false });
        
        if (error) {
            postsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>Error loading posts</p></div>';
            return;
        }
        
        channelPosts = data;
        
        if (channelPosts.length === 0) {
            postsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>No posts yet in this channel</p></div>';
            return;
        }
        
        // Get user info for each post
        const userIds = [...new Set(channelPosts.map(p => p.user_id))];
        const { data: users } = await _supabase
            .from('users')
            .select('id, username, display_name, avatar_url, verification_badge')
            .in('id', userIds);
        
        const userMap = {};
        users.forEach(u => userMap[u.id] = u);
        
        // Get user likes
        const { data: likes } = await _supabase
            .from('likes')
            .select('post_id')
            .eq('user_id', currentUserId);
        
        likedPosts.clear();
        if (likes) likes.forEach(like => likedPosts.add(like.post_id));
        
        renderPosts(userMap);
    }
    
    function renderPosts(userMap) {
        postsContainer.innerHTML = channelPosts.map(post => {
            const author = userMap[post.user_id] || { username: 'Unknown', display_name: 'Unknown' };
            const displayName = author.display_name || author.username;
            const avatarInitial = displayName.charAt(0).toUpperCase();
            const isLiked = likedPosts.has(post.id);
            const canDelete = isOwner || post.user_id === currentUserId;
            const badgeIcon = getBadgeIcon(author.verification_badge);
            
            return `
                <div class="channel-post" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${avatarInitial}</div>
                        <div class="post-user-info">
                            <div class="post-username">
                                ${escapeHtml(displayName)} ${badgeIcon}
                                <span class="post-time">${formatTimeAgo(post.created_at)}</span>
                            </div>
                        </div>
                        ${canDelete ? `<div class="delete-post" data-post-id="${post.id}"><i class="fas fa-trash"></i></div>` : ''}
                    </div>
                    ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                    <div class="post-content">${linkify(escapeHtml(post.content))}</div>
                    <div class="post-stats">
                        <div class="post-stat">
                            <button class="interaction-btn ${isLiked ? 'liked' : ''}" data-action="like" data-post-id="${post.id}">
                                <i class="fas fa-heart"></i> ${post.like_count || 0}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        // Add like handlers
        document.querySelectorAll('.interaction-btn[data-action="like"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = btn.dataset.postId;
                toggleLike(postId);
            });
        });
        
        // Add delete handlers
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const postId = btn.dataset.postId;
                if (confirm('Delete this post?')) {
                    await _supabase
                        .from('channel_posts')
                        .update({ status: 'deleted' })
                        .eq('id', postId);
                    showToast('Post deleted', 'success');
                    await loadChannelPosts();
                    await loadStats();
                }
            });
        });
    }
    
    async function toggleLike(postId) {
        const isLiked = likedPosts.has(postId);
        
        if (isLiked) {
            await _supabase
                .from('likes')
                .delete()
                .eq('post_id', postId)
                .eq('user_id', currentUserId);
            
            await _supabase
                .from('channel_posts')
                .update({ like_count: _supabase.sql`like_count - 1` })
                .eq('id', postId);
            
            likedPosts.delete(postId);
        } else {
            await _supabase
                .from('likes')
                .insert({ post_id: postId, user_id: currentUserId });
            
            await _supabase
                .from('channel_posts')
                .update({ like_count: _supabase.sql`like_count + 1` })
                .eq('id', postId);
            
            likedPosts.add(postId);
        }
        
        await loadChannelPosts();
    }
    
    async function createChannelPost() {
        const content = postContent.value.trim();
        if (!content) {
            showToast('Please enter content', 'warning');
            return;
        }
        
        submitPostBtn.disabled = true;
        submitPostBtn.textContent = 'Posting...';
        
        const { error } = await _supabase
            .from('channel_posts')
            .insert({
                channel_id: channelId,
                user_id: currentUserId,
                title: postTitle.value.trim() || null,
                content: content,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            showToast('Failed to create post', 'error');
        } else {
            showToast('Post created!', 'success');
            postTitle.value = '';
            postContent.value = '';
            createPostModal.classList.remove('show');
            await loadChannelPosts();
            await loadStats();
        }
        
        submitPostBtn.disabled = false;
        submitPostBtn.textContent = 'Post';
    }
    
    // ========================================
    // EVENT LISTENERS
    // ========================================
    document.getElementById('openCreatePostModal')?.addEventListener('click', () => {
        createPostModal.classList.add('show');
    });
    
    document.getElementById('closeModal')?.addEventListener('click', () => {
        createPostModal.classList.remove('show');
    });
    
    submitPostBtn?.addEventListener('click', createChannelPost);
    
    followBtn?.addEventListener('click', toggleFollow);
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    notificationIcon?.addEventListener('click', () => {
        window.location.href = 'notifications.html';
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    // ========================================
    // INITIALIZATION
    // ========================================
    async function init() {
        if (!await checkAuth()) return;
        if (!await loadChannel()) return;
        await checkFollowStatus();
        await loadStats();
        await loadChannelPosts();
        await updateNotificationBadge();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
