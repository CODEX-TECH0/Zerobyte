<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <title>Groups - ZERØBYTE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0B1220;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --bg-glass-hover: rgba(31, 41, 55, 0.8);
            --bg-glass-solid: rgba(17, 24, 39, 0.95);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-soft: rgba(59, 130, 246, 0.15);
            --error: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-glass-solid: rgba(255, 255, 255, 0.95);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-glass: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: rotate-reverse 50s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }
        
        .nav-icons i {
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-icons i:hover {
            color: var(--primary);
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem 1rem;
        }
        
        .groups-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .groups-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .create-group-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .create-group-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
        }
        
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
        }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-glass-solid);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        
        .group-card {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .group-card:hover {
            border-color: var(--primary-soft);
            transform: translateX(4px);
        }
        
        .group-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .group-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .group-info {
            flex: 1;
        }
        
        .group-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
        
        .group-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .group-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .group-stats i {
            margin-right: 0.25rem;
        }
        
        .private-badge {
            background: var(--warning);
            color: white;
            font-size: 0.6rem;
            padding: 0.125rem 0.375rem;
            border-radius: var(--radius-sm);
        }
        
        .join-btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            align-self: center;
        }
        
        .join-btn.joined {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
        }
        
        .join-btn:hover {
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.5;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-glass-solid);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-2xl);
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .modal-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .modal-btn:hover {
            background: var(--primary-hover);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            padding: 0.5rem 0.75rem;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-soft);
        }
        
        .nav-item i {
            font-size: 1.25rem;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-glass);
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .error-box {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #EF4444;
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-box.show {
            display: block;
        }
        
        .error-box p {
            font-size: 0.875rem;
            color: #EF4444;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .navbar .nav-icons {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar">
    <div class="logo" id="logo">
        <i class="fas fa-bolt"></i> ZERØBYTE
    </div>
    <div class="nav-icons">
        <i class="fas fa-bell" id="notificationIcon"></i>
        <i class="fas fa-sign-out-alt" id="logoutIcon"></i>
    </div>
</nav>

<div class="container">
    <div class="groups-header">
        <div class="groups-title">
            <i class="fas fa-users"></i> Groups
        </div>
        <button class="create-group-btn" id="createGroupBtn">
            <i class="fas fa-plus"></i>
        </button>
    </div>
    
    <div id="errorBox" class="error-box">
        <p><i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span></p>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="my">My Groups</button>
        <button class="tab" data-tab="discover">Discover</button>
    </div>
    
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search groups...">
    </div>
    
    <div id="groupsList">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading groups...</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" data-page="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item active" data-page="groups"><i class="fas fa-users"></i><span>Groups</span></div>
    <div class="nav-item" data-page="channels"><i class="fas fa-broadcast-tower"></i><span>Channels</span></div>
    <div class="nav-item" data-page="chats"><i class="fas fa-message"></i><span>Chats</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<!-- Create Group Modal -->
<div class="modal" id="createGroupModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> Create Group</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Group Name</label>
            <input type="text" id="groupName" class="form-input" placeholder="Enter group name">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="groupDescription" class="form-textarea" placeholder="Describe your group..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" id="groupPrivate"> Private Group
            </label>
            <small style="color: var(--text-muted); display: block; margin-top: 0.25rem;">Private groups are hidden and require approval to join</small>
        </div>
        <button class="modal-btn" id="submitGroupBtn">Create Group</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://tzfnmcbegbuwuzkqdphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Zm5tY2JlZ2J1d3V6a3FkcGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDM3NTEsImV4cCI6MjA5NTI3OTc1MX0.RQJIfVX_HB-4mtcqmZHrowyFXyGJTxoL6wNj6Y5R6Hk';
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserId = null;
    let currentUser = null;
    let currentTab = 'my';
    let myGroups = [];
    let discoverGroups = [];
    let joinedGroupIds = new Set();
    
    const groupsList = document.getElementById('groupsList');
    const searchInput = document.getElementById('searchInput');
    const tabs = document.querySelectorAll('.tab');
    const createGroupBtn = document.getElementById('createGroupBtn');
    const createGroupModal = document.getElementById('createGroupModal');
    const closeModal = document.getElementById('closeModal');
    const submitGroupBtn = document.getElementById('submitGroupBtn');
    const groupNameInput = document.getElementById('groupName');
    const groupDescriptionInput = document.getElementById('groupDescription');
    const groupPrivateCheckbox = document.getElementById('groupPrivate');
    const notificationIcon = document.getElementById('notificationIcon');
    const errorBox = document.getElementById('errorBox');
    const errorMessageSpan = document.getElementById('errorMessage');
    
    function showError(message) {
        errorMessageSpan.textContent = message;
        errorBox.classList.add('show');
        setTimeout(() => errorBox.classList.remove('show'), 5000);
    }
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}" style="margin-right: 0.5rem;"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function updateNotificationBadge() {
        if (!currentUserId) return;
        const { count } = await _supabase
            .from('notifications')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);
        
        const existingBadge = notificationIcon?.querySelector('.notification-badge');
        if (existingBadge) existingBadge.remove();
        
        if (count > 0 && notificationIcon) {
            const badge = document.createElement('span');
            badge.className = 'notification-badge';
            badge.textContent = count > 9 ? '9+' : count;
            notificationIcon.style.position = 'relative';
            notificationIcon.appendChild(badge);
        }
    }
    
    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        currentUserId = session.user.id;
        
        const { data: user } = await _supabase.from('users').select('*').eq('id', currentUserId).single();
        currentUser = user;
        return true;
    }
    
    async function loadJoinedGroups() {
        const { data, error } = await _supabase
            .from('group_members')
            .select('group_id')
            .eq('user_id', currentUserId);
        
        if (error) {
            console.error('Load joined groups error:', error);
            return;
        }
        
        joinedGroupIds.clear();
        if (data) {
            data.forEach(m => joinedGroupIds.add(m.group_id));
        }
    }
    
    async function loadMyGroups() {
        const { data, error } = await _supabase
            .from('groups')
            .select('*')
            .eq('status', 'active')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error('Load my groups error:', error);
            groupsList.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i><p>Error loading groups</p></div>';
            return;
        }
        
        myGroups = data.filter(group => joinedGroupIds.has(group.id));
        
        for (const group of myGroups) {
            const { count } = await _supabase
                .from('group_members')
                .select('*', { count: 'exact', head: true })
                .eq('group_id', group.id);
            group.member_count = count || 0;
        }
        
        return myGroups;
    }
    
    async function loadDiscoverGroups() {
        const { data, error } = await _supabase
            .from('groups')
            .select('*')
            .eq('status', 'active')
            .eq('is_private', false)
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error('Load discover groups error:', error);
            discoverGroups = [];
            return [];
        }
        
        discoverGroups = data.filter(group => !joinedGroupIds.has(group.id));
        
        for (const group of discoverGroups) {
            const { count } = await _supabase
                .from('group_members')
                .select('*', { count: 'exact', head: true })
                .eq('group_id', group.id);
            group.member_count = count || 0;
        }
        
        return discoverGroups;
    }
    
    async function joinGroup(groupId) {
        const { error } = await _supabase
            .from('group_members')
            .insert({ group_id: groupId, user_id: currentUserId });
        
        if (error) {
            showToast('Failed to join group', 'error');
            return false;
        }
        
        joinedGroupIds.add(groupId);
        showToast('Joined group!', 'success');
        
        const group = [...myGroups, ...discoverGroups].find(g => g.id === groupId);
        if (group && group.owner_id !== currentUserId) {
            await _supabase.from('notifications').insert({
                user_id: group.owner_id,
                type: 'system',
                actor_id: currentUserId,
                target_id: groupId,
                target_type: 'group',
                content: `${currentUser?.display_name || 'Someone'} joined your group "${group.name}"`,
                created_at: new Date().toISOString()
            });
            updateNotificationBadge();
        }
        
        await refreshGroups();
        return true;
    }
    
    async function leaveGroup(groupId) {
        const { error } = await _supabase
            .from('group_members')
            .delete()
            .eq('group_id', groupId)
            .eq('user_id', currentUserId);
        
        if (error) {
            showToast('Failed to leave group', 'error');
            return false;
        }
        
        joinedGroupIds.delete(groupId);
        showToast('Left group', 'success');
        await refreshGroups();
        return true;
    }
    
    async function createGroup() {
        const name = groupNameInput.value.trim();
        const description = groupDescriptionInput.value.trim();
        const isPrivate = groupPrivateCheckbox.checked;
        
        if (!name) {
            showError('Please enter a group name');
            return;
        }
        
        if (name.length < 3) {
            showError('Group name must be at least 3 characters');
            return;
        }
        
        const inviteCode = Math.random().toString(36).substring(2, 10).toUpperCase();
        
        try {
            const { data, error } = await _supabase
                .from('groups')
                .insert({
                    name: name,
                    description: description || null,
                    owner_id: currentUserId,
                    is_private: isPrivate,
                    invite_code: inviteCode,
                    created_at: new Date().toISOString()
                })
                .select()
                .single();
            
            if (error) {
                console.error('Create group error:', error);
                showError('Failed to create group: ' + (error.message || 'Unknown error'));
                return;
            }
            
            if (data) {
                // Add creator as member with admin role
                await _supabase
                    .from('group_members')
                    .insert({ group_id: data.id, user_id: currentUserId, role: 'admin' });
                
                joinedGroupIds.add(data.id);
                showToast('Group created successfully!', 'success');
                
                createGroupModal.classList.remove('show');
                groupNameInput.value = '';
                groupDescriptionInput.value = '';
                groupPrivateCheckbox.checked = false;
                
                await refreshGroups();
            }
        } catch (err) {
            console.error('Create group exception:', err);
            showError('An error occurred while creating the group');
        }
    }
    
    function renderGroups(groups) {
        const searchTerm = searchInput.value.toLowerCase();
        const filtered = groups.filter(group => 
            group.name.toLowerCase().includes(searchTerm) ||
            (group.description && group.description.toLowerCase().includes(searchTerm))
        );
        
        if (filtered.length === 0) {
            if (currentTab === 'my') {
                groupsList.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i><p>You haven\'t joined any groups yet</p><p style="font-size: 0.875rem; margin-top: 0.5rem;">Discover groups to join!</p></div>';
            } else {
                groupsList.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No groups found</p></div>';
            }
            return;
        }
        
        groupsList.innerHTML = filtered.map(group => {
            const isJoined = joinedGroupIds.has(group.id);
            const isOwner = group.owner_id === currentUserId;
            const avatarInitial = group.name.charAt(0).toUpperCase();
            
            return `
                <div class="group-card" data-group-id="${group.id}">
                    <div class="group-avatar">
                        ${group.avatar_url ? `<img src="${group.avatar_url}">` : `<i class="fas fa-users"></i>`}
                    </div>
                    <div class="group-info">
                        <div class="group-name">
                            ${escapeHtml(group.name)}
                            ${group.is_private ? '<span class="private-badge"><i class="fas fa-lock"></i> Private</span>' : ''}
                            ${isOwner ? '<span style="font-size: 0.7rem; color: var(--primary);"><i class="fas fa-crown"></i> Owner</span>' : ''}
                        </div>
                        <div class="group-description">${escapeHtml(group.description || 'No description')}</div>
                        <div class="group-stats">
                            <span><i class="fas fa-users"></i> ${group.member_count || 0} members</span>
                            <span><i class="fas fa-calendar"></i> ${new Date(group.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                    ${!isOwner ? `
                        <button class="join-btn ${isJoined ? 'joined' : ''}" data-group-id="${group.id}" data-action="${isJoined ? 'leave' : 'join'}">
                            ${isJoined ? '<i class="fas fa-check"></i> Joined' : '<i class="fas fa-plus"></i> Join'}
                        </button>
                    ` : ''}
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.group-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.join-btn')) return;
                const groupId = card.dataset.groupId;
                window.location.href = `group-chat.html?id=${groupId}`;
            });
        });
        
        document.querySelectorAll('.join-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const groupId = btn.dataset.groupId;
                const action = btn.dataset.action;
                
                if (action === 'join') {
                    await joinGroup(groupId);
                } else {
                    await leaveGroup(groupId);
                }
            });
        });
    }
    
    async function refreshGroups() {
        await loadJoinedGroups();
        
        if (currentTab === 'my') {
            await loadMyGroups();
            renderGroups(myGroups);
        } else {
            await loadDiscoverGroups();
            renderGroups(discoverGroups);
        }
    }
    
    // Tab switching
    tabs.forEach(tab => {
        tab.addEventListener('click', async () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            await refreshGroups();
        });
    });
    
    // Search
    searchInput.addEventListener('input', () => {
        if (currentTab === 'my') {
            renderGroups(myGroups);
        } else {
            renderGroups(discoverGroups);
        }
    });
    
    // Create group modal
    createGroupBtn.addEventListener('click', () => {
        createGroupModal.classList.add('show');
    });
    
    closeModal.addEventListener('click', () => {
        createGroupModal.classList.remove('show');
        errorBox.classList.remove('show');
    });
    
    createGroupModal.addEventListener('click', (e) => {
        if (e.target === createGroupModal) {
            createGroupModal.classList.remove('show');
            errorBox.classList.remove('show');
        }
    });
    
    submitGroupBtn.addEventListener('click', createGroup);
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (page === 'home') window.location.href = 'home.html';
            if (page === 'search') window.location.href = 'search.html';
            if (page === 'groups') window.location.href = 'groups.html';
            if (page === 'channels') window.location.href = 'channels.html';
            if (page === 'chats') window.location.href = 'chats.html';
            if (page === 'profile') window.location.href = 'profile.html';
        });
    });
    
    document.getElementById('logo')?.addEventListener('click', () => {
        window.location.href = 'home.html';
    });
    
    notificationIcon?.addEventListener('click', () => {
        window.location.href = 'notifications.html';
    });
    
    document.getElementById('logoutIcon')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    });
    
    async function init() {
        if (!await checkAuth()) return;
        await refreshGroups();
        await updateNotificationBadge();
        setInterval(updateNotificationBadge, 30000);
    }
    
    init();
})();
</script>
</body>
</html>
